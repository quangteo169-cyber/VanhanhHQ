<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0b1a34">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Báo cáo PVH">
<title>Trung tâm Báo cáo PVH · HQ </title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
 --bg0:#060d1c;--bg1:#0a1730;--bg2:#0e2144;
 --card:#ffffff;--ink:#132038;--muted:#7d92b0;
 --cyan:#22d3ee;--blue:#1e5fd0;--indigo:#1e5fd0;--violet:#2e86e6;--pink:#4aa8f0;--green:#34d399;--amber:#fbbf24;--red:#f43f5e;
 --glass:rgba(17,32,58,.55);--glassb:rgba(120,180,255,.16);--grid:#eef2f8;
 --sideg:linear-gradient(180deg,#0b1a34,#081327);
}
*{box-sizing:border-box;margin:0;padding:0}
button,select,input{font-family:inherit}
/* thanh kéo mỏng + gradient */
*{scrollbar-width:thin;scrollbar-color:#2e86e6 transparent}
*::-webkit-scrollbar{width:6px;height:6px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#2e86e6,#22d3ee);border-radius:8px}
*::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,#4aa8f0,#22d3ee)}
body{font-family:'Be Vietnam Pro',Arial,"Segoe UI",sans-serif;color:#e7effb;min-width:1220px;
 background:radial-gradient(1200px 600px at 78% -6%,rgba(30,95,208,.18),transparent 60%),radial-gradient(1000px 520px at 0% 100%,rgba(34,211,238,.14),transparent 55%),linear-gradient(160deg,var(--bg0),var(--bg1) 55%,var(--bg2));
 background-attachment:fixed;}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
 background-image:linear-gradient(rgba(120,170,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(120,170,255,.045) 1px,transparent 1px);background-size:38px 38px;}
.layout{display:flex;min-height:100vh;position:relative;z-index:1}
.side{width:266px;flex:0 0 266px;height:100vh;position:sticky;top:0;overflow-y:auto;padding:12px 11px;
 background:var(--sideg);border-right:1px solid rgba(120,180,255,.12);backdrop-filter:blur(8px)}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 13px;border-bottom:1px solid rgba(120,180,255,.14)}
.logo{width:40px;height:40px;border-radius:11px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 18px rgba(34,211,238,.55)}
.logo img,.loginlogo img{width:100%;height:100%;object-fit:contain;display:block}
.brand b{font-size:14px;background:linear-gradient(90deg,#7fe9ff,#7cc4f7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand small{display:block;font-size:10px;color:#8aa0bd}
.lgout{margin-left:auto;flex:0 0 auto;width:30px;height:30px;border-radius:8px;border:1px solid rgba(120,180,255,.25);background:transparent;color:#8aa0bd;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s,border-color .15s,background .15s}
.lgout:hover{color:#fb7185;border-color:rgba(251,113,133,.55);background:rgba(251,113,133,.1)}
.tier{font-size:10px;color:#6f8bb0;text-transform:uppercase;letter-spacing:.8px;margin:15px 8px 6px;font-weight:bold}
.nav{display:flex;gap:9px;align-items:center;padding:9px;border-radius:10px;cursor:pointer;font-size:12.5px;color:#c3d4ec;transition:.15s;border:1px solid transparent}
.nav:hover{background:rgba(120,170,255,.09);border-color:rgba(120,180,255,.14)}
.nav.active{background:linear-gradient(90deg,rgba(34,211,238,.22),rgba(30,95,208,.22));color:#fff;font-weight:bold;border-color:rgba(120,200,255,.4);box-shadow:0 0 16px rgba(59,130,246,.35)}
.nav .code{font-size:10px;color:#7fb4e0;flex:0 0 46px}
.nav.big{background:rgba(30,95,208,.12);border:1px solid rgba(90,150,240,.25);margin-bottom:4px}
.dot{width:8px;height:8px;border-radius:50%;flex:0 0 8px;box-shadow:0 0 8px currentColor}
.main{flex:1;padding:16px 22px;overflow-x:hidden}
.demo{border-radius:12px;padding:9px 15px;font-size:12px;font-weight:bold;margin-bottom:13px;color:#0a1020;
 background:linear-gradient(90deg,#fbbf24,#fb7185);box-shadow:0 6px 22px rgba(251,113,133,.28)}
.top{border-radius:14px;padding:15px 18px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;
 background:var(--glass);border:1px solid var(--glassb);backdrop-filter:blur(10px);box-shadow:0 8px 30px rgba(0,0,0,.25)}
.top h1{font-size:20px;background:linear-gradient(90deg,#a5f3fc,#7cc4f7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.top .meta{font-size:12px;color:#9fb4d3;margin-top:7px;line-height:1.6}
.filters{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;justify-content:flex-end}
.top>div:last-child{margin-left:auto}
.fg{display:flex;flex-direction:column;gap:3px}.fg label{font-size:10px;color:#8aa0bd;text-transform:uppercase;letter-spacing:.4px}
select{background:rgba(10,25,50,.9);color:#e7effb;border:1px solid rgba(120,180,255,.35);border-radius:9px;padding:7px 11px;font-size:13px;font-weight:bold;cursor:pointer}
select:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 10px rgba(34,211,238,.4)}
.btn{background:linear-gradient(90deg,var(--cyan),var(--blue));color:#06101f;border:none;padding:8px 15px;border-radius:9px;font-size:12.5px;cursor:pointer;font-weight:bold;box-shadow:0 4px 16px rgba(34,211,238,.35)}
.btn:hover{filter:brightness(1.08)}.btn:active{transform:translateY(1px)}
.status{font-size:11px;color:#9fb4d3;text-align:right;line-height:1.5;margin-top:6px}
.live{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:15px}
.kpi{border-radius:14px;padding:14px 16px;position:relative;overflow:hidden;
 background:linear-gradient(160deg,rgba(34,211,238,.10),rgba(30,95,208,.08));border:1px solid var(--glassb);backdrop-filter:blur(8px);box-shadow:0 6px 22px rgba(0,0,0,.22)}
.kpi::after{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--violet),var(--pink))}
.kpi .lbl{font-size:11.5px;color:#9fb4d3}
.kpi .val{font-size:19px;font-weight:800;margin-top:4px;background:linear-gradient(90deg,#8ff0ff,#7cc4f7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 22px rgba(120,200,255,.25)}
.kpi .sub{font-size:11px;margin-top:3px;color:#9fb4d3}
.up{color:#4ade80!important}.down{color:#fb7185!important}.flat{color:#9fb4d3!important}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;margin-bottom:15px}
.grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:13px;margin-bottom:15px}
.card{background:var(--card);border-radius:14px;padding:15px 16px;color:var(--ink);position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(2,8,23,.35)}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--indigo),var(--violet))}
.card h3{font-size:13.5px;text-align:center;margin-bottom:10px;color:#1c2c4a;font-weight:bold}
.chartbox{position:relative;height:240px}.chartbox.sm{height:200px}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;color:var(--ink)}
.tbl th{background:linear-gradient(90deg,#0b3a8f,#1e5fd0);color:#fff;padding:8px 10px;text-align:left;position:sticky;top:0}
.tbl td{padding:7px 10px;border-top:1px solid var(--grid)}
.tbl tr:nth-child(even) td{background:#f5f8fd}
.tbl td.n,.tbl th.n{text-align:right;font-variant-numeric:tabular-nums}
.scroll{max-height:400px;overflow:auto;border-radius:9px}
.note{background:linear-gradient(160deg,#fff7e6,#fef1dd);color:#8a5b12;border-radius:10px;padding:11px 14px;font-size:12.5px;line-height:1.6;border-left:3px solid var(--amber)}
.ok{background:linear-gradient(160deg,#e7fbf1,#dff7ee);color:#0f7a4d;border-radius:10px;padding:11px 14px;font-size:12.5px;border-left:3px solid var(--green)}
.badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:bold;color:#fff;box-shadow:0 0 12px rgba(120,200,255,.3)}
.row{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.small{font-size:11px;color:var(--muted)}

.loginwrap{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(1000px 500px at 50% 0%,rgba(30,95,208,.25),transparent),linear-gradient(160deg,#060d1c,#0a1730)}
.loginbox{width:340px;background:rgba(17,32,58,.78);border:1px solid rgba(120,180,255,.25);border-radius:16px;padding:30px 26px;text-align:center;backdrop-filter:blur(12px);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.loginlogo{width:64px;height:64px;border-radius:14px;margin:0 auto 14px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 24px rgba(34,211,238,.5)}
.logintitle{font-size:17px;font-weight:bold;background:linear-gradient(90deg,#a5f3fc,#7cc4f7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.loginsub{font-size:12px;color:#9fb4d3;margin:4px 0 20px}
.loginbox input{width:100%;padding:11px 13px;margin-bottom:12px;border-radius:9px;border:1px solid rgba(120,180,255,.3);background:rgba(8,18,36,.85);color:#e7effb;font-size:14px}
.loginbox input:focus{outline:none;border-color:#22d3ee;box-shadow:0 0 10px rgba(34,211,238,.35)}
.loginbtn{width:100%;padding:11px;border:none;border-radius:9px;background:linear-gradient(90deg,#22d3ee,#1e5fd0);color:#06101f;font-weight:bold;font-size:14px;cursor:pointer;box-shadow:0 6px 18px rgba(34,211,238,.35)}
.loginbtn:hover{filter:brightness(1.08)}
.loginerr{color:#fb7185;font-size:12px;margin-top:10px;min-height:16px}
.filters input[type=date]{background:rgba(10,25,50,.9);color:#e7effb;border:1px solid rgba(120,180,255,.35);border-radius:9px;padding:6px 10px;font-size:13px;font-weight:bold}
.filters input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer}
.presets{display:flex;gap:5px}
.pbtn{background:rgba(30,95,208,.28);color:#cfe0f0;border:1px solid rgba(120,180,255,.3);border-radius:8px;padding:6px 9px;font-size:11px;font-weight:bold;cursor:pointer}
.pbtn:hover{background:rgba(30,95,208,.55)}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;color:#9fb4d3;gap:12px}
.spin{width:26px;height:26px;border:3px solid rgba(120,180,255,.25);border-top-color:#22d3ee;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Trang Nguồn & Cấu hình (SRC) ===== */
.sechead{display:flex;align-items:center;gap:8px;margin:2px 0 12px;font-weight:800;color:#1c2c4a;font-size:13.5px}
.sechead .sq{width:9px;height:9px;border-radius:3px;box-shadow:0 0 8px rgba(30,95,208,.45)}
.sechead .cnt{margin-left:auto;font-size:11px;color:#7d92b0;font-weight:600}
.avt{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;flex:0 0 30px;letter-spacing:.5px}
.usr{display:flex;align-items:center;gap:9px;min-width:0}
.usr .em{font-weight:600;color:#132038;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.usr .tag{font-size:10.5px;color:#7d92b0}
.strip{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid #f0e3c8;background:linear-gradient(160deg,#fffaf0,#fdf3dd);border-radius:10px;margin-bottom:8px;flex-wrap:wrap}
.stdot{display:inline-block;width:9px;height:9px;border-radius:50%;flex:0 0 9px;vertical-align:middle}
.stdot.ok{background:#22c55e;box-shadow:0 0 4px rgba(34,197,94,.45)}
.stdot.warn{background:#f59e0b;box-shadow:0 0 4px rgba(245,158,11,.45)}
.stdot.bad{background:#f43f5e;box-shadow:0 0 4px rgba(244,63,94,.45)}
.srcpill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:14px;font-size:11px;font-weight:700;white-space:nowrap}
.gidm{font-family:Consolas,"Roboto Mono",monospace;font-size:11px;color:#8aa0bd}
.tbl tbody tr:hover td{background:#eef4fd}
.tbl tr.grp td{background:#f2f6fc!important;font-weight:800;color:#0b3a8f;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:6px 10px}
.rolebadge{display:inline-block;padding:3px 10px;border-radius:14px;font-size:11px;font-weight:700;color:#fff}
/* dropdown tick chọn báo cáo (mục Quản lý đăng nhập) */
.pgpick{display:inline-block}
.pgpick>summary{list-style:none;cursor:pointer;border:1px solid #c9d6ea;border-radius:7px;padding:6px 10px;font-size:12px;background:#fff;color:#1c2c4a;min-width:200px;max-width:240px;display:flex;justify-content:space-between;gap:8px;align-items:center}
.pgpick>summary::-webkit-details-marker{display:none}
.pgpick>summary .pgsum{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pgpick[open]>summary{border-color:#1e5fd0;box-shadow:0 0 0 2px rgba(30,95,208,.15)}
.pgmenu{position:fixed;z-index:200;background:#fff;border:1px solid #c9d6ea;border-radius:9px;box-shadow:0 14px 36px rgba(2,8,23,.28);padding:9px;width:286px;max-height:min(70vh,360px);overflow:auto}
.pgmenu .qa{display:flex;gap:5px;margin-bottom:7px}
.pgmenu .qa button{flex:1;font-size:11px;padding:5px 4px;border:1px solid #c9d6ea;border-radius:6px;background:#f4f7fc;cursor:pointer;color:#1c2c4a;font-weight:bold}
.pgmenu .qa button:hover{background:#e6edf6}
.pgmenu label{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:6px;font-size:12.5px;color:#1c2c4a;cursor:pointer}
.pgmenu label:hover{background:#eef4ff}
.pgmenu label input{width:15px;height:15px;accent-color:#1e5fd0;flex:0 0 15px}
.pgmenu label b{flex:0 0 46px}
.pgmenu .allrow{border-bottom:1px solid #e6edf6;margin-bottom:4px;padding-bottom:6px;font-weight:bold}

/* ===== MOBILE (≤1000px): sidebar thành menu trượt, lưới dồn 1-2 cột ===== */
.mbtn{display:none;position:fixed;top:12px;left:12px;z-index:120;width:42px;height:42px;border-radius:12px;border:1px solid rgba(120,180,255,.35);background:rgba(10,25,50,.92);color:#a5f3fc;font-size:19px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4)}
#mask{display:none;position:fixed;inset:0;background:rgba(3,8,18,.55);z-index:99;backdrop-filter:blur(2px)}
@media(max-width:1000px){
 body{min-width:0}
 .mbtn{display:flex;align-items:center;justify-content:center}
 body.menuopen #mask{display:block}
 .side{position:fixed;left:0;top:0;bottom:0;height:100dvh;width:280px;z-index:100;transform:translateX(-105%);transition:transform .22s ease}
 body.menuopen .side{transform:none;box-shadow:12px 0 40px rgba(0,0,0,.5)}
 .main{padding:10px 10px 24px}
 .top{padding:12px;gap:10px}
 .top h1{font-size:16.5px;padding-left:46px;line-height:1.3}
 .top .meta{font-size:11px;padding-left:46px}
 .top>div:last-child{margin-left:0;width:100%}
 .filters{justify-content:flex-start;width:100%}
 .filters .fg{flex:1 1 130px}
 .filters input[type=date],.filters select{width:100%}
 .status{text-align:left}
 .kpis{grid-template-columns:repeat(2,1fr)!important;gap:9px}
 .kpi{padding:11px 12px}.kpi .val{font-size:16px}
 .grid2,.grid3{grid-template-columns:1fr!important;gap:11px}
 .chartbox{height:210px}.chartbox.sm{height:185px}
 .card{padding:12px}
 .tbl{font-size:11.5px}.tbl th,.tbl td{padding:6px 7px}
 .loginbox{width:92vw;max-width:340px}
 .strip>span[style*="margin-left:auto"]{margin-left:0!important;width:100%}
 .pgpick>summary{min-width:150px}
}
/* hộp Hỏi đáp dữ liệu */
#askwrap{position:fixed;inset:0;z-index:600;display:none}
#askback{position:absolute;inset:0;background:rgba(3,8,18,.62);backdrop-filter:blur(3px)}
#askbox{position:relative;margin:5vh auto 0;width:min(780px,94vw);max-height:88vh;overflow:auto;background:#fff;color:#14243d;border-radius:16px;padding:16px 18px;box-shadow:0 24px 70px rgba(0,0,0,.5)}
.askhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:#0b3a8f;font-size:15px}
.askrow{display:flex;gap:8px}
.askrow input{flex:1;padding:10px 13px;border:1px solid #c9d6ea;border-radius:9px;font-size:13.5px;font-family:inherit;color:#14243d}
.askrow input:focus{outline:none;border-color:#2e86e6;box-shadow:0 0 0 3px rgba(46,134,230,.15)}
.askchips{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
#askbox .pbtn{background:#eef4ff;color:#0b3a8f;border:1px solid #c9d6ea}
#askbox .pbtn:hover{background:#dbe9ff;transform:none}
.askans{background:#f6f9ff;border-left:3px solid #1e5fd0;border-radius:10px;padding:10px 13px;margin-top:10px;font-size:13px;line-height:1.65}
.askq{font-weight:700;color:#0b3a8f;margin-bottom:5px}
#askbox .tbl td,#askbox .tbl th{padding:6px 8px;font-size:12px}
/* card diễn giải & phân tích tự động */
.insight{background:linear-gradient(160deg,#f6f9ff,#eef4ff);border-left:3px solid #1e5fd0}
.insight h3{text-align:left;color:#0b3a8f}
.insight ul{margin:4px 0 0 20px;display:flex;flex-direction:column;gap:7px;font-size:12.8px;line-height:1.6}
.insight li::marker{color:#1e5fd0}
</style>
</head>
<body>
<div id="login" class="loginwrap">
  <div class="loginbox">
    <div class="loginlogo"><img src="icon-192.png" alt="HQ Group"></div>
    <div class="logintitle">Trung tâm Báo cáo PVH</div>
    <div class="loginsub">Đăng nhập nội bộ · HQ Group</div>
    <div id="gbtn" style="display:flex;justify-content:center"></div>
    <div id="gsep" class="loginsub" style="display:none;margin:10px 0 12px">— hoặc mật khẩu nội bộ —</div>
    <input id="lgEmail" type="email" placeholder="Email" autocomplete="username"/>
    <input id="lgPass" type="password" placeholder="Mật khẩu" autocomplete="current-password"/>
    <button class="loginbtn" onclick="doLogin()">Đăng nhập</button>
    <div id="lgErr" class="loginerr"></div>
  </div>
</div>
<div id="askwrap">
  <div id="askback" onclick="askClose()"></div>
  <div id="askbox">
    <div class="askhead"><b>💬 Hỏi đáp dữ liệu</b><button class="pbtn" onclick="askClose()">✕ Đóng</button></div>
    <div class="askrow"><input id="askinp" placeholder="Ví dụ: nhập Robux tháng 6 · so sánh T5 vs T6 · top 5 NCC Gift Card…" onkeydown="if(event.key==='Enter')askGo()"><button class="btn" onclick="askGo()">Hỏi</button></div>
    <div id="askchips" class="askchips"></div>
    <div id="asklog"></div>
  </div>
</div>
<button class="mbtn" onclick="toggleMenu()" aria-label="Menu">☰</button>
<div class="layout">

 const ton=mi=>{if(iTon<0)return 0;const c=col[mi];return c==null?0:num((rows[iTon]||[])[c]);};
 return {val,nhap,xuat,thiethai,don,ton};}
function parseNCC(rows){
 /* Cấu trúc thật của tab (DATA MONTHLY - PCU):
    - hàng tiêu đề tháng dạng 01/2026, 02/2026… (cột E là tổng năm — bỏ qua)
    - tab chia khu: "Tổng CO Nhập" / "Tổng CO Xuất"… — chỉ lấy khu CO Nhập
    - tên SPDV mở khối và tên NCC nằm CÙNG một cột; cột kế bên chỉ là cột phụ
    - spCol = cột chứa NHIỀU tên SPDV nhất trên toàn tab (tránh dính ô lạc ở góc sheet) */
 const cnt={};
 for(let r=0;r<rows.length;r++){const row=rows[r]||[];for(let c=0;c<row.length;c++)if(canonSP(row[c]))cnt[c]=(cnt[c]||0)+1;}
 let spCol=-1,bestN=0;Object.keys(cnt).forEach(c=>{if(cnt[c]>bestN){bestN=cnt[c];spCol=+c;}});
 if(spCol<0)spCol=2;
 const col=monthCols(rows)||{0:spCol+3,1:spCol+4,2:spCol+5,3:spCol+6,4:spCol+7,5:spCol+8,6:spCol+9,7:spCol+10,8:spCol+11,9:spCol+12,10:spCol+13,11:spCol+14};
 const reNhap=/tổng\s*co\s*nhập/i,reXuat=/tổng\s*co\s*xuất/i,reTh=/thiệt\s*hại/i;
 const okName=n=>!!(n&&n.toLowerCase()!=='nan'&&!/^tổng/i.test(n)&&!/danh mục/i.test(n)&&!/^%/.test(n));
 let hasSec=false;
 for(let r=0;r<rows.length&&!hasSec;r++){if((rows[r]||[]).some(x=>reNhap.test(''+x)))hasSec=true;}
 const data={},hdr={};let cur=null,sec=hasSec?null:'nhap',lastPre='';
 for(let r=0;r<rows.length;r++){const row=rows[r]||[];
  if(row.some(x=>reNhap.test(''+x))){sec='nhap';cur=null;continue;}
  if(row.some(x=>reXuat.test(''+x))){sec='xuat';cur=null;continue;}
  if(row.some(x=>reTh.test(''+x))){sec='th';cur=null;continue;}
  const sp=canonSP(row[spCol]);
  const nm=(''+(row[spCol+1]||'')).trim();
  /* Hàng MỞ KHỐI = tên SPDV ở cột nhãn VÀ cột NCC kế bên TRỐNG (chính là hàng tổng của khối).
     Cột nhãn còn sót nhãn cũ có thể TRÙNG tên SPDV (vd nhãn cũ "Razer Gold" nằm ngay hàng
     SEAGM API giữa khối Gift Card) — hàng có tên NCC thật ở cột kế thì KHÔNG mở khối mới. */
  if(sp&&!okName(nm)){cur=(sec==='nhap')?sp:null;lastPre='';
   if(cur){if(!data[cur])data[cur]=[];if(!hdr[cur])hdr[cur]=row;}continue;}
  if(!cur)continue;
  /* tên thật ở cột kế bên phải cột nhãn (kể cả khi trùng tên SPDV như "Supercell" trong
     khối Topup); cột kế trống thì mới dùng cột nhãn */
  const pre=(''+(row[spCol]||'')).trim();
  if(okName(pre))lastPre=pre; /* nhớ NCC gần nhất trong khối (ô merge chỉ ghi dòng đầu) — hàng này chắc chắn không phải mở khối nên nhãn là dữ liệu, kể cả khi trùng tên SPDV như Supercell */
  let ncc=okName(nm)?nm:pre;
  /* "người nhập" dạng AUTO/Thủ công (khối Topup theo NV): ghép với NCC ở cột nhãn
     (Oggaming · AUTO, Galaxylink · AUTO…) để 2 dòng AUTO của 2 NCC khác nhau không bị gộp mất */
  if(okName(nm)&&/^(auto|thủ\s*công|thu\s*cong|manual)$/i.test(nm)&&lastPre)ncc=lastPre+' · '+nm;
  if(okName(ncc))data[cur].push({name:ncc,row});}
 return {data,col,spCol,hdr};}
/* validator: nguồn đọc về phải parse ra số thật thì mới nhận (không thì thử nguồn kia) */
const VAL_SPDV=rows=>{try{const P=parseSPDV(rows);return SPDV.some(sp=>{for(let i=0;i<12;i++)if(P.val(P.nhap,sp,i)>0)return true;return false;});}catch(e){return false;}};
const VAL_NCC=rows=>{try{const N=parseNCC(rows);return Object.keys(N.data).some(sp=>N.data[sp].some(it=>{for(let i=0;i<12;i++)if(num(it.row[N.col[i]]))return true;return false;}));}catch(e){return false;}};
const VAL_FX=rows=>rows.some(r=>{const d=parseDateCell((r||[])[1]);return !!d&&num((r||[])[2])>0;});
function applyLive(a,b){let ok=false;
 if(a&&a.length){const P=parseSPDV(a);let hit=false;
   SPDV.forEach(sp=>{for(let i=0;i<12;i++)if(P.val(P.nhap,sp,i)>0)hit=true;});
   if(hit){/* chỉ ghi đè khi parse ra số thật — tránh xoá số dự phòng bằng 0 */
     SPDV.forEach(sp=>{for(let i=0;i<12;i++){NHAP[sp][i]=P.val(P.nhap,sp,i);XUAT[sp]=XUAT[sp]||Array(12).fill(0);XUAT[sp][i]=P.val(P.xuat,sp,i);if(DIE[sp])DIE[sp][i]=P.thiethai(sp,i);}});
     for(let i=0;i<12;i++){DON.Robux[i]=P.don(i);TON[i]=P.ton(i);}ok=true;}}
 if(b&&b.length){const r=aggByName(b);
   if(Object.keys(r.all).length){NCC_ALL=r.all;NCC_TOT=r.tots;
     const rb=r.all["Robux"];if(rb)NCC_ROBUX=rb.map(x=>[x[0],x[1].reduce((a,b)=>a+b,0)]).sort((a,b)=>b[1]-a[1]).slice(0,10);}}
 return ok;}
/* Gom tab dạng "khối theo SPDV, mỗi dòng một tên" (Data theo NCC · Data Nhập Theo Nhân viên):
   mỗi tên một dòng; chỉ gộp khi TRÙNG HỆT tên (không phân biệt hoa thường) —
   "SEAGM" và "SEAGM API" là 2 tên khác nhau, không bao giờ bị trộn */
function aggByName(rows){const N=parseNCC(rows);const all={},tots={};
 Object.keys(N.data).forEach(sp=>{
   const m={},ord=[];
   N.data[sp].forEach(it=>{const vals=[];for(let i=0;i<12;i++){const c=N.col[i];vals.push(c!=null?num(it.row[c]):0);}
    if(!it.name||!vals.some(v=>v>0))return;
    const k=it.name.toLowerCase().replace(/\s+/g,' ');
    if(!m[k]){m[k]=[it.name,vals.slice()];ord.push(k);}
    else{for(let i=0;i<12;i++)m[k][1][i]+=vals[i];}});
   const arr=ord.map(k=>m[k]);if(arr.length)all[sp]=arr;});
 Object.keys(N.hdr||{}).forEach(sp=>{const vals=[];for(let i=0;i<12;i++){const c=N.col[i];vals.push(c!=null?num(N.hdr[sp][c]):0);}if(vals.some(v=>v>0))tots[sp]=vals;});
 return {all,tots};}
let NV_ALL={},NV_TOT={}; /* PVH3 — Data Nhập Theo Nhân viên */
function applyNV(rows){if(!rows||!rows.length)return;const r=aggByName(rows);if(Object.keys(r.all).length){NV_ALL=r.all;NV_TOT=r.tots;}}

}

/* ===== DIỄN GIẢI & PHÂN TÍCH TỰ ĐỘNG (sinh từ số liệu trong phạm vi lọc) ===== */
function insightCard(items,title){const it=(items||[]).filter(Boolean);if(!it.length)return '';
 return `<div class="card insight"><h3>🔎 Diễn giải & phân tích tự động${title?' — '+title:''}</h3><ul>${it.map(t=>`<li>${t}</li>`).join('')}</ul><div class="small" style="margin-top:7px">Nhận định sinh tự động từ số liệu trong phạm vi lọc — đổi Từ ngày/Đến ngày sẽ cập nhật theo.</div></div>`;}
const insAbs=x=>(Math.abs(x)*100).toFixed(1)+'%';
/* mô tả tăng/giảm có màu; bad=true khi TĂNG là xấu (thiệt hại, giá vốn) */
function insUD(x,bad){if(!isFinite(x)||x===0)return '<span class="flat">đi ngang</span>';
 const c=(x>0)===!bad?'up':'down';return `<span class="${c}">${x>0?'tăng':'giảm'} ${insAbs(x)}</span>`;}
/* thống kê 1 chuỗi theo tháng: đỉnh/đáy, chuỗi tăng/giảm liên tiếp cuối kỳ, %MoM cuối */
function insSeries(vals){const n=vals.length;if(!n)return null;
 let hi=0,lo=0;vals.forEach((v,i)=>{if(v>vals[hi])hi=i;if(v<vals[lo])lo=i;});
 let k=0,dir=0;for(let i=n-1;i>0;i--){const d=Math.sign(vals[i]-vals[i-1]);if(!d)break;if(!dir)dir=d;if(d!==dir)break;k++;}
 const mom=n>1&&vals[n-2]?vals[n-1]/vals[n-2]-1:null;
 return {hi,lo,k,dir,mom};}
const insT=(tmn,i)=>'T'+pad2(tmn[i]+1);
/* chú thích khi tháng cuối trong phạm vi CHƯA trọn tháng (đang chạy) — tránh đọc nhầm "giảm sâu" */
function insNote(tmn){if(!tmn||!tmn.length)return null;const t=TD,last=tmn[tmn.length-1];
 if(t.y===2026&&last===t.mo&&t.d<new Date(t.y,t.mo+1,0).getDate())
  return `<i>Lưu ý: T${pad2(last+1)} mới có số đến ${pad2(t.d)}/${pad2(t.mo+1)} (chưa trọn tháng) — các mức giảm so tháng này chỉ mang tính tham khảo.</i>`;
 return null;}

 PVH10:{title:"PVH10 · Năng suất xử lý đơn (SLA/Accuracy)",meta:"Nguồn: Báo cáo Năng xuất Xử lý đơn 2026 — tab Theo tháng (báo cáo ngày, lọc Từ–Đến) + tab Theo năm (nhân sự × tháng)",render(host){

     else{

         const psS=sum(ps0),htS=sum(htT),ltM=meanPos(ltT),pcM=meanPos(pcT),hyS=sum(hy0);
         const f1=n=>n.toLocaleString('vi-VN',{minimumFractionDigits:1,maximumFractionDigits:1});
         const stf=staffOf(T.ht).map(st=>[st.name,sum(st)]).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]);
         let pk=null;days.forEach(dc=>{const v=ps0?(ps0.daily[dc.dk]||0):0;if(!pk||v>pk[1])pk=[dc.dk,v];});
         const p10Ins=[
          `Trong ${days.length} ngày: phát sinh <b>${fmt(psS)}</b> đơn, hoàn tất <b>${fmt(htS)}</b> (bình quân ${fmt(Math.round(htS/(days.length||1)))} đơn/ngày); hủy ${fmt(hyS)} đơn.`,
          pk&&pk[1]>0?`Ngày cao điểm: <b>${pk[0].slice(8,10)}/${pk[0].slice(5,7)}</b> với ${fmt(pk[1])} đơn phát sinh.`:null,
          `Lead time trung bình <b>${f1(ltM)} h</b> — <span class="${ltM<=4?'up':'down'}">${ltM<=4?'đạt':'vượt'} KPI ${T.lt&&T.lt.kpi?T.lt.kpi:'≤4h'}</span>; tỷ lệ đạt KPI lead time <b>${f1(pcM)}%</b> <span class="${pcM>=85?'up':'down'}">(${pcM>=85?'trên':'dưới'} mốc ${T.pc&&T.pc.kpi?T.pc.kpi:'85%'})</span>.`,
          stf[0]?`Nhân sự xử lý nhiều nhất: <b>${stf[0][0]}</b> (${fmt(stf[0][1])} đơn = ${pct(stf[0][1]/(htS||1))})${stf.length>1?`; kế đến ${stf.slice(1,3).map(x=>x[0]+' ('+fmt(x[1])+')').join(', ')}`:''}.`:null,
         ];
         insEnd=insightCard(p10Ins);

           ${kpi("Lead time TB",f1(ltM)+" h",`<span class="${ltM<=4?'up':'down'}">${ltM<=4?'✓ đạt':'✗ vượt'} KPI ${T.lt?T.lt.kpi:'≤4h'}</span>`)}
           ${kpi("Tỷ lệ đạt KPI leadtime",f1(pcM)+"%",`<span class="${pcM>=85?'up':'down'}">${pcM>=85?'✓ đạt':'✗ dưới'} mức ${T.pc?T.pc.kpi:'>85%'}</span>`)}
           ${kpi("Đơn hủy",fmt(hyS),"trong phạm vi")}
          </div>
          <div class="grid2" style="grid-template-columns:1.5fr 1fr">
           ${cc("Đơn phát sinh vs hoàn tất theo ngày","p10a")}
           <div class="card"><h3>Năng suất nhân sự — kỳ lọc</h3><div class="scroll" style="max-height:250px"><table class="tbl"><thead><tr><th>Nhân sự</th><th class="n">Hoàn tất</th><th class="n">Lead TB (h)</th><th class="n">% đạt KPI</th></tr></thead><tbody>
           ${staffOf(T.ht).map(st=>{const lt=T.lt?T.lt.rows.find(r=>r.name===st.name):null;const pc=T.pc?T.pc.rows.find(r=>r.name===st.name):null;
             const l=meanPos(lt),p=meanPos(pc),ht=sum(st);
             return `<tr><td>${st.name}</td><td class="n">${fmt(ht)}</td><td class="n"><span class="${l?(l<=4?'up':'down'):'flat'}">${l?f1(l):'—'}</span></td><td class="n"><span class="${p?(p>=85?'up':'down'):'flat'}">${p?f1(p)+'%':'—'}</span></td></tr>`;}).join('')}
           <tr style="font-weight:bold;background:#eef4ff"><td>TỔNG</td><td class="n">${fmt(htS)}</td><td class="n">${f1(ltM)}</td><td class="n">${f1(pcM)}%</td></tr>
           </tbody></table></div></div>
          </div>`;
         charts.push({id:'p10a',labels:days.map(dc=>dc.dk.slice(8,10)+'/'+dc.dk.slice(5,7)),
           s1:days.map(dc=>ps0?(ps0.daily[dc.dk]||0):0),s2:days.map(dc=>htT?(htT.daily[dc.dk]||0):0)});
       }}
     /* ---- THEO NĂM: nhân sự × tháng ---- */
     const Y=parseSlaNam(Ry);
     if(!Y){h+=`<div class="note" style="margin-top:13px"><b>Không đọc được tab "Theo năm"</b> (gid ${SLA_GIDS.nam}) — cần hàng "Tháng" (1..12) và hàng "Tổng NĂM". <button class="btn" onclick="delete SLAD.nam;render()">↻ Thử lại</button></div>`;}
     else{
       const sSum=Y.staff.reduce((a,st)=>a+st.yr,0);
       const hiM=Y.yByM.indexOf(Math.max(...Y.yByM));
       h+=`<div class="card" style="margin-top:13px"><h3>Theo năm — ${fmt(Y.yTot)} đơn · ${Y.staff.length} nhân sự · đỉnh T${pad2(hiM+1)} (${fmt(Y.yByM[hiM])})${Math.abs(sSum-Y.yTot)>Math.max(1,Y.yTot*0.001)?` · <span style="color:#b91c1c">cộng nhân sự ${fmt(sSum)} ≠ Tổng NĂM ${fmt(Y.yTot)}</span>`:' · <span style="color:#0f7a4d">✓ khớp hàng Tổng NĂM</span>'}</h3>
        <div class="grid2" style="grid-template-columns:1fr 1fr;margin-bottom:0">${cc("Tổng đơn xử lý theo tháng","p10y")}${cc("Theo nhân sự (cả năm)","p10s")}</div>
        <div class="scroll" style="max-height:340px;margin-top:12px"><table class="tbl"><thead><tr><th>Nhân sự</th><th class="n">Cả năm</th>${MN.map(m=>`<th class="n">${m}</th>`).join('')}</tr></thead><tbody>
        ${Y.staff.map(st=>`<tr><td>${st.name}</td><td class="n"><b>${fmt(st.yr)}</b></td>${st.m.map(v=>`<td class="n">${fmtn(v)}</td>`).join('')}</tr>`).join('')}
        <tr style="font-weight:bold;background:#eef4ff"><td>Tổng NĂM</td><td class="n">${fmt(Y.yTot)}</td>${Y.yByM.map(v=>`<td class="n">${fmtn(v)}</td>`).join('')}</tr>
        </tbody></table></div></div>`;
       charts.push({id:'p10y',labels:MN,bar:Y.yByM});
       const topS=Y.staff.slice(0,16);
       charts.push({id:'p10s',labels:topS.map(st=>st.name),hbar:topS.map(st=>st.yr)});
     }
     host.innerHTML=h+insEnd;
     charts.forEach(ch=>{
       if(ch.s1)mk(ch.id,{type:'bar',data:{labels:ch.labels,datasets:[{label:'Phát sinh',data:ch.s1,backgroundColor:'#7cc4f7'},{label:'Hoàn tất',data:ch.s2,backgroundColor:'#1e5fd0'}]},options:barOpt(true)});
       else if(ch.bar)mk(ch.id,{type:'bar',data:{labels:ch.labels,datasets:[{data:ch.bar,backgroundColor:'#2e86e6',borderRadius:2}]},options:barOpt(false)});
       else if(ch.hbar)mk(ch.id,{type:'bar',data:{labels:ch.labels,datasets:[{data:ch.hbar,backgroundColor:'#1e5fd0'}]},options:hbarOpt()});});

 PVH12:{title:"PVH12 · Báo cáo Hoàn (nick/đơn)",meta:"Nguồn: Data Nick Roblox (realtime)",render(host){

 PVH4:{title:"PVH4 · Biến động giá vốn theo tháng — Robux · Razer Gold",meta:"GV ĐV = Σ Thành tiền ÷ Σ SL (bình quân GIA QUYỀN, loại dòng tiền = 0) · Razer: Rate = giá vốn (USD/RG) · cả kỳ, không phụ thuộc bộ lọc ngày",render(host){
   host.innerHTML=spinner("Đang đọc Data Robux · Data Razergold và tính giá vốn gia quyền…");
   Promise.all([costMonths('robux'),costMonths('razer')]).then(([MR,MZ])=>{
     const charts=[];
     const section=(key,M,pfx)=>{
       const cfg=COSTCFG[key];
       const fm=n=>n.toLocaleString('vi-VN',{minimumFractionDigits:cfg.dec,maximumFractionDigits:cfg.dec});
       const fmoney=n=>cfg.cur==='USD'?n.toLocaleString('vi-VN',{minimumFractionDigits:2,maximumFractionDigits:2}):fmt(n);

         return `<div class="note" style="margin-bottom:13px"><b>Không đọc được nguồn giá vốn ${cfg.sp}</b> (gid ${cfg.gid})${sample.length?' — đọc được dữ liệu nhưng không dò ra hàng tiêu đề':' — không tải được CSV (kiểm tra Publish to web / trang Nguồn &amp; Cấu hình)'}.<br><button class="btn" style="margin-top:8px" onclick="COSTD.${key}=undefined;render()">↻ Thử lại</button></div>${prev}`;}
       const ms=M.map((m,i)=>({mi:i,rows:m.rows,sl:m.sl,tien:m.tien,donSl:m.donSl,gv:m.sl>0?m.tien/m.sl:0})).filter(m=>m.tien>0);
       const totT=ms.reduce((a,m)=>a+m.tien,0),totS=ms.reduce((a,m)=>a+m.sl,0),bq=totS?totT/totS:0;
       const totDon=M.reduce((a,m)=>a+m.donSl,0),totDonRows=M.reduce((a,m)=>a+m.donRows,0);
       const last=ms[ms.length-1],prev2=ms.length>1?ms[ms.length-2]:null;

       const hi=ms.reduce((a,m)=>m.gv>a.gv?m:a,ms[0]),lo=ms.reduce((a,m)=>m.gv<a.gv?m:a,ms[0]);
       const gvUnit=cfg.cur+'/'+cfg.unit;

       const momsL=ms.map((m,j)=>j>0?(m.gv-ms[j-1].gv)/ms[j-1].gv:null);
       let big=null;ms.forEach((m,j)=>{if(momsL[j]!=null&&(big==null||Math.abs(momsL[j])>Math.abs(momsL[big])))big=j;});
       let stk=0,sd=0;for(let j=ms.length-1;j>0;j--){const d=Math.sign(ms[j].gv-ms[j-1].gv);if(!d)break;if(!sd)sd=d;if(d!==sd)break;stk++;}
       const vsBQ=bq?last.gv/bq-1:0;
       const insC=[
        `Giá vốn T${pad2(last.mi+1)} = <b>${fm(last.gv)} ${gvUnit}</b>${prev2?` — ${insUD(mom,true)} so với T${pad2(prev2.mi+1)} (${fm(prev2.gv)})`:''}.`,
        `So bình quân năm ${fm(bq)}: tháng hiện tại <b>${vsBQ>=0?'cao hơn':'thấp hơn'} ${insAbs(vsBQ)}</b>.`,
        `Đỉnh <b>T${pad2(hi.mi+1)}</b> (${fm(hi.gv)}) — đáy <b>T${pad2(lo.mi+1)}</b> (${fm(lo.gv)}); biên độ dao động cả kỳ ${insAbs(lo.gv?hi.gv/lo.gv-1:0)}.`,
        stk>=2?`Giá vốn đã <span class="${sd>0?'down':'up'}">${sd>0?'tăng':'giảm'} ${stk} tháng liên tiếp</span>.`:null,
        big!=null&&momsL[big]!=null&&ms.length>2?`Biến động mạnh nhất: <b>T${pad2(ms[big].mi+1)}</b> ${insUD(momsL[big],true)} so tháng liền trước.`:null,
        insNote(ms.map(m=>m.mi)),
       ];
       return `

       ${kpi("Tổng mua cả kỳ",fmoney(totT)+" "+cfg.cur,fmt(totS)+" "+cfg.unit+" · "+fmt(ms.reduce((a,m)=>a+m.rows,0))+" dòng"+(cfg.cur==='USD'?" · ≈ "+fmt(totT*27000)+" đ (×27.000)":""))}
       ${kpi("Đã loại ("+cfg.don+")",fmt(totDon)+" "+cfg.unit,totDonRows+" dòng tiền = 0 — không tính vào GV")}
      </div>
      <div class="grid2" style="grid-template-columns:1.5fr 1fr">
       ${cc(cfg.sp+" — giá vốn ĐV theo tháng ("+gvUnit+") · đường đứt: BQ năm · cột: %MoM","c_"+pfx)}

 PVH5:{title:"PVH5 · Biến động giá vốn theo NCC — Gift Card (SKU × NCC)",meta:"Ô = giá bình quân gia quyền ($) của SKU tại NCC trong khoảng lọc · loại dòng trạng thái Ngưng hoạt động · chọn 1 ngày / 1 tuần / 1 tháng bằng Từ–Đến hoặc preset · ô xanh = NCC rẻ nhất",render(host){
   host.innerHTML=spinner("Đang đọc Data giftcard và dựng ma trận giá SKU × NCC…");
   priceRecs('gc').then(R=>{

     const skus={},nccTot={};

     const nccs=Object.keys(nccTot).sort((a,b)=>nccTot[b]-nccTot[a]);

     rowsD.sort((a,b)=>((b.cnt>1)-(a.cnt>1))||b.spread-a.spread||a.sku.localeCompare(b.sku));
     window._p5={rowsD,nccs};
     const multi=rowsD.filter(r=>r.cnt>1);

     const bestCnt={};multi.forEach(r=>{bestCnt[r.best]=(bestCnt[r.best]||0)+1;});
     const bestOrd=Object.keys(bestCnt).sort((a,b)=>bestCnt[b]-bestCnt[a]);
     let paid=0,minCost=0;rowsD.forEach(r=>{nccs.forEach(n=>{const c=skus[r.sku][n];if(c){paid+=c.v;minCost+=r.mn*c.w;}});});

      bestOrd[0]?`<b>${bestOrd[0]}</b> là NCC rẻ nhất ở <b>${bestCnt[bestOrd[0]]}/${multi.length}</b> SKU so sánh được${bestOrd.length>1?`; kế đến ${bestOrd.slice(1,3).map(n=>n+' ('+bestCnt[n]+')').join(', ')}`:''}.`:null,
      top?`Chênh giá mạnh nhất: <b>${top.sku}</b> — rẻ nhất tại <b>${top.best}</b> ($${f2$(top.mn)}), NCC cao nhất đắt hơn ${(top.spread*100).toFixed(1)}%.`:null,
      save>0.005&&paid>0?`Nếu dồn toàn bộ lượng mua kỳ này về NCC rẻ nhất của từng SKU, chi phí ước giảm <b>$${f2$(save)}</b> (${insAbs(save/paid)} tổng tiền mua) — tham khảo, chưa tính giới hạn nguồn hàng.`:null,
     ];
     host.innerHTML=`
      <div class="kpis">
       ${kpi("SKU có giá trong kỳ",fmt(rowsD.length),scopeLabel())}
       ${kpi("NCC có hàng",fmt(nccs.length),"cột ma trận, xếp theo giá trị nhập")}
       ${kpi("SKU so được ≥2 NCC",fmt(multi.length),"có thể chọn NCC rẻ nhất")}
       ${kpi("Chênh giá mạnh nhất",top?(top.spread*100).toFixed(1)+"%":"—",top?top.sku.slice(0,40):"chưa có SKU nào ≥2 NCC")}
      </div>
      <div class="card"><h3>Ma trận giá SKU × NCC — ${scopeLabel()}</h3>
       <div class="row" style="margin-bottom:8px"><input id="p5q" placeholder="Tìm SKU / danh mục…" style="flex:1;max-width:340px;padding:8px 12px;border:1px solid #c9d6ea;border-radius:8px;font-size:13px" oninput="window._p5q=this.value;renderP5Table()">
        <span class="small">Ô <span style="background:#dcfce7;color:#166534;padding:1px 7px;border-radius:4px;font-weight:bold">xanh</span> = NCC rẻ nhất của SKU (khi có ≥2 NCC) · Chênh % = (đắt nhất − rẻ nhất) ÷ rẻ nhất</span></div>
       <div class="scroll" style="max-height:520px" id="p5tb"></div></div>
      ${insightCard(p5Ins)}
      <div class="note" style="margin-top:12px">Topup và các SPDV khác sẽ nối cùng khuôn ma trận này khi chốt nguồn từng loại.</div>`;
     renderP5Table();
   });

  const usd=num(row[iGia]);if(!(usd>0))continue;
  let days=null;
  if(iDays>=0){const dv=num(row[iDays]);if(dv>=0&&(''+row[iDays]).trim()!=='')days=dv;}
  if(days==null&&iTao>=0){const dt=parseDateCell(row[iTao]);
   if(dt)days=Math.max(0,Math.round((new Date(t0.y,t0.mo,t0.d)-new Date(2026,dt.mo,dt.d))/86400000));}
  recs.push({cat,usd,days:days==null?0:days});}
 return recs.length?{recs,fx,sheetTot}:null;}

const BASE_SLA="https://docs.google.com/spreadsheets/d/e/2PACX-1vRHGRhq3zSjBYecJRUbTLwlgjvx-A7hIu8J0eSkUKuXZI7uMWYLjyUeIKefumrnQLC5jIbW55y0lE1W/pub";
const SLA_GIDS={nam:'1982526665',ngay:'511745866'};
function slaURL(gid){return BASE_SLA+"?gid="+gid+"&single=true&output=csv";}
function slaApiURL(gid){return "/api/csv?f=sla&gid="+gid;}
const SLAD={};
async function slaRows(key){if(SLAD[key]!==undefined)return SLAD[key];
 const gid=SLA_GIDS[key];
 let rows=await loadCSV(slaURL(gid));
 if(!rows||rows.length<2)rows=await loadCSV(slaApiURL(gid));
 SLAD[key]=(rows&&rows.length>1)?rows:null;return SLAD[key];}
const slaN=x=>{try{x=(''+x).normalize('NFC');}catch(e){x=''+x;}return x.replace(/\u00A0/g,' ').trim();};
/* --- tab THEO THÁNG: CỘT = NGÀY (01/07…), các khối chỉ số theo hàng band, mỗi khối TỔNG + nhân sự --- */
function parseSlaThang(rows){
 if(!rows||rows.length<3)return null;
 let HR=-1,iTot=-1,iAvg=-1,dateCols=null;
 for(let r=0;r<Math.min(rows.length,12);r++){const row=rows[r]||[];
  const iN=row.findIndex(x=>slaN(x).toLowerCase()==='ngày');if(iN<0)continue;
  const cols=[];for(let c=iN+1;c<row.length;c++){const m=slaN(row[c]).match(/^(\d{1,2})\/(\d{1,2})(?:\/\d{4})?$/);
   if(m){const dd=+m[1],mo=+m[2];if(mo>=1&&mo<=12&&dd>=1&&dd<=31)cols.push({ci:c,dk:dkey(mo-1,dd)});}}
  if(cols.length>=5){HR=r;dateCols=cols;
   iTot=row.findIndex(x=>/total|^tổng$/i.test(slaN(x)));
   iAvg=row.findIndex(x=>/avg|bình\s*quân/i.test(slaN(x)));break;}}
 if(HR<0)return null;
 const lab=r=>{const row=rows[r]||[];for(let c=0;c<Math.min(row.length,4);c++){const v=slaN(row[c]);if(v)return v;}return '';};
 const SS=[['ps',/đơn\s*phát\s*sinh/i],['ht',/đơn\s*hoàn\s*tất/i],['lt',/lead\s*time/i],['pc',/tỷ\s*lệ.*(kpi|leadtime)/i],['hy',/đơn\s*h[uủ]y/i]];
 const marks=[];
 for(let r=HR+1;r<rows.length;r++){const l=lab(r);if(!l)continue;
  for(const[k,re]of SS){if(re.test(l)&&!marks.some(m=>m.k===k)){
   const kpi=(rows[r]||[]).map(slaN).filter(x=>x&&!re.test(x)&&x.toLowerCase()!=='kpi').join(' ');
   marks.push({k,r,kpi});break;}}}
 if(!marks.length)return null;
 const secEnd=r0=>{const nxt=marks.filter(m=>m.r>r0).sort((a,b)=>a.r-b.r)[0];return nxt?nxt.r:rows.length;};
 const readBlock=r0=>{const out=[];for(let r=r0+1;r<secEnd(r0);r++){const row=rows[r]||[];
   const daily={};let any=false;
   dateCols.forEach(dc=>{const v=slaN(row[dc.ci]);if(v!==''){daily[dc.dk]=num(v);any=true;}});
   const tot=iTot>=0?num(row[iTot]):0,avg=iAvg>=0?num(row[iAvg]):0;
   if(!any&&!tot&&!avg)continue;
   out.push({name:lab(r),tot,avg,daily});}
  return out;};
 const o={dateCols};marks.forEach(m=>{o[m.k]={kpi:m.kpi,rows:readBlock(m.r)};});
 return (o.ht||o.ps)?o:null;}
/* --- tab THEO NĂM: ma trận nhân sự × 12 tháng, hàng "Tổng NĂM" + hàng "Tháng" (1..12) --- */
function parseSlaNam(rows){
 if(!rows||rows.length<3)return null;
 const lab=r=>{const row=rows[r]||[];for(let c=0;c<Math.min(row.length,3);c++){const v=slaN(row[c]);if(v)return v;}return '';};
 let mrow=-1,mcols=null,totCol=-1;
 for(let r=0;r<Math.min(rows.length,80);r++){
  if(!/^tháng$/i.test(lab(r)))continue;
  const row=rows[r]||[];const map={};
  for(let c=0;c<row.length;c++){const v=slaN(row[c]);for(let k=1;k<=12;k++)if(v===''+k&&map[k]==null)map[k]=c;}
  if(Object.keys(map).length>=6){mrow=r;mcols=map;totCol=(map[1]||1)-1;break;}}
 if(mrow<0)return null;
 let yTot=null,yByM=null;
 for(let r=Math.max(0,mrow-4);r<=mrow;r++){if(/tổng\s*năm/i.test(lab(r))){const row=rows[r]||[];
  yTot=num(row[totCol]);yByM=Array.from({length:12},(_,i)=>mcols[i+1]!=null?num(row[mcols[i+1]]):0);break;}}
 const staff=[];
 for(let r=mrow+1;r<rows.length;r++){const name=lab(r);if(!name||/^tổng/i.test(name))continue;
  const row=rows[r]||[];const m=Array.from({length:12},(_,i)=>mcols[i+1]!=null?num(row[mcols[i+1]]):0);
  const yr=num(row[totCol])||m.reduce((a,b)=>a+b,0);
  if(yr>0||m.some(v=>v>0))staff.push({name,yr,m});}
 if(!staff.length&&yByM==null)return null;
 if(yByM==null){yByM=Array.from({length:12},(_,i)=>staff.reduce((a,st)=>a+st.m[i],0));yTot=yByM.reduce((a,b)=>a+b,0);}
 return {yTot,yByM,staff:staff.sort((a,b)=>b.yr-a.yr)};}

/* ===== PVH5: ma trận giá SKU × NCC — bình quân gia quyền trong khoảng lọc (Gift Card trước) ===== */
const PRICECFG={gc:{gid:'1043029815',sp:'Gift Card',cur:'$'}};
const PRICED={};
function parsePriceRaw(rows){
 if(!rows||rows.length<2)return null;
 const norm=x=>{try{x=(''+x).normalize('NFC');}catch(e){x=''+x;}return x.replace(/\u00A0/g,' ').trim().toLowerCase();};
 let H=-1,iN=-1,iSku=-1,iNcc=-1,iGia=-1,iSl=-1,iLoai=-1,iTT=-1;
 for(let r=0;r<Math.min(rows.length,30);r++){const row=(rows[r]||[]).map(norm);
  const d=row.findIndex(x=>/ngày/.test(x));
  const k=row.findIndex(x=>/danh\s*mục|sku/.test(x));
  const n=row.findIndex(x=>/^ncc$|nhà\s*cung\s*cấp/.test(x));
  const g=row.findIndex(x=>/đơn\s*giá/.test(x));
  if(d>-1&&k>-1&&n>-1&&g>-1){H=r;iN=d;iSku=k;iNcc=n;iGia=g;
   iSl=row.findIndex(x=>(/số\s*lượng|^sl$/.test(x))&&!/dùng/.test(x));
   iTT=row.findIndex(x=>/trạng\s*thái/.test(x));break;}}
 if(H<0){H=0;iN=13;iSku=8;iNcc=5;iGia=10;iSl=-1;iLoai=3;} /* fallback: chỉ số cột đã verify trước đây */
 else{/* dò cột "thêm mới code" theo dữ liệu (cột loại giao dịch) */
  const cnt={};for(let r=H+1;r<Math.min(rows.length,H+400);r++){const row=rows[r]||[];
   for(let c=0;c<row.length;c++)if(/thêm\s*mới\s*code/i.test(''+row[c]))cnt[c]=(cnt[c]||0)+1;}
  let best=-1,bn=0;Object.keys(cnt).forEach(c=>{if(cnt[c]>bn){bn=cnt[c];best=+c;}});iLoai=best;}
 if(iTT<0){/* không có header Trạng thái → dò cột theo dữ liệu ("hoạt động"/"ngưng hoạt động") */
  const cnt={};for(let r=H+1;r<Math.min(rows.length,H+400);r++){const row=rows[r]||[];
   for(let c=0;c<row.length;c++)if(/ho[aạ]t\s*động/i.test(norm(row[c]||'')))cnt[c]=(cnt[c]||0)+1;}
  let best=-1,bn=0;Object.keys(cnt).forEach(c=>{if(cnt[c]>bn){bn=cnt[c];best=+c;}});iTT=best;}
 const recs=[];let excl=0;
 for(let r=H+1;r<rows.length;r++){const row=rows[r];if(!row)continue;
  if(iLoai>=0&&!/thêm\s*mới\s*code/i.test(''+(row[iLoai]||'')))continue; /* chỉ dòng nhập code mới */
  if(iTT>=0&&/ng[ưừ]ng\s*ho[aạ]t\s*động/i.test(norm(row[iTT]||''))){excl++;continue;} /* bỏ trạng thái Ngưng hoạt động */
  const dt=parseDateCell(row[iN]);if(!dt)continue;
  const sku=(''+(row[iSku]||'')).trim();if(!sku)continue;
  const ncc=(''+(row[iNcc]||'')).trim();if(!ncc)continue;
  const gia=num(row[iGia]);if(!(gia>0))continue;
  const sl=iSl>=0?(num(row[iSl])||1):1;
  recs.push({dk:dkey(dt.mo,dt.d),sku,ncc,gia,sl});}
 if(!recs.length)return null;recs._excl=excl;return recs;}

async function askPrice(qn,qd){const R=await priceRecs('gc');
 if(!R)return 'Chưa đọc được Data giftcard (kiểm tra Nguồn & Cấu hình).';
 const fk=iso(FROM),tk=iso(TO);const inS=R.filter(r=>r.dk>=fk&&r.dk<=tk);
 if(!inS.length)return `Không có lô nhập Gift Card trong ${scopeLabel()} — nới khoảng lọc hoặc bấm Cả kỳ.`;
 const skus={},nccTot={};
 inS.forEach(r=>{const sx=skus[r.sku]=skus[r.sku]||{};const c=sx[r.ncc]=sx[r.ncc]||{v:0,w:0};c.v+=r.gia*r.sl;c.w+=r.sl;nccTot[r.ncc]=(nccTot[r.ncc]||0)+r.gia*r.sl;});
 const f2=n=>n.toLocaleString('vi-VN',{minimumFractionDigits:2,maximumFractionDigits:2});
 const rowsD=Object.keys(skus).map(sku=>{const m=skus[sku];let mn=Infinity,mx=-Infinity,best='';const cells={};
  Object.keys(m).forEach(n=>{const pr=m[n].v/m[n].w;cells[n]=pr;if(pr<mn){mn=pr;best=n;}if(pr>mx)mx=pr;});
  const cnt=Object.keys(cells).length;return {sku,cells,mn,mx,best,cnt,spread:cnt>1?(mx-mn)/mn:0};});
 const tokens=qd.split(/[^a-z0-9$]+/).filter(t=>t.length>=4&&!/nhat|chenh|card|gift|thang|trong|nhap|ngung/.test(t));
 let skuHit=null;for(const r of rowsD){const dn=deacc(r.sku);if(tokens.some(t=>dn.indexOf(t)>-1)){skuHit=r;break;}}
 if(skuHit){let h=`<b>${skuHit.sku}</b> (${scopeLabel()}): `;
  const ord=Object.keys(skuHit.cells).sort((a,b)=>skuHit.cells[a]-skuHit.cells[b]);
  h+=ord.map(n=>`${n} <b>$${f2(skuHit.cells[n])}</b>`).join(' · ');
  if(skuHit.cnt>1)h+=`<br>→ Rẻ nhất: <b>${skuHit.best}</b>; chênh rẻ–đắt ${(skuHit.spread*100).toFixed(1)}%.`;
  return h;}
 if(/chenh/.test(qd)){const tops=rowsD.filter(r=>r.cnt>1).sort((a,b)=>b.spread-a.spread).slice(0,5);
  if(!tops.length)return 'Chưa có SKU nào so sánh được ≥2 NCC trong kỳ.';
  return `<b>Top ${tops.length} SKU chênh giá mạnh nhất</b> (${scopeLabel()}):<div class="scroll" style="max-height:240px;margin-top:8px"><table class="tbl"><thead><tr><th>SKU</th><th>Rẻ nhất tại</th><th class="n">Giá rẻ nhất</th><th class="n">Chênh %</th></tr></thead><tbody>${tops.map(r=>`<tr><td>${r.sku}</td><td>${r.best}</td><td class="n">$${f2(r.mn)}</td><td class="n">${(r.spread*100).toFixed(1)}%</td></tr>`).join('')}</tbody></table></div>`;}
 const multi=rowsD.filter(r=>r.cnt>1);const bestCnt={};multi.forEach(r=>{bestCnt[r.best]=(bestCnt[r.best]||0)+1;});
 const ord=Object.keys(bestCnt).sort((a,b)=>bestCnt[b]-bestCnt[a]);
 let h=`Trong ${scopeLabel()}: ${Object.keys(skus).length} SKU · ${Object.keys(nccTot).length} NCC · ${multi.length} SKU so được ≥2 NCC${R._excl?` (đã loại ${fmt(R._excl)} dòng Ngưng hoạt động)`:''}.`;
 if(ord.length)h+=`<br>NCC rẻ nhất ở nhiều SKU nhất: ${ord.slice(0,3).map(n=>`<b>${n}</b> (${bestCnt[n]} SKU)`).join(' · ')}.`;
 return h;}
async function askTon(qn,qd){const T=await tonKhoData();
 if(!T)return 'Chưa đọc được file Tồn kho (mở PVH6 kiểm tra hoặc xem Nguồn & Cấu hình).';
 const {recs,fx}=T;const f1=n=>n.toLocaleString('vi-VN',{minimumFractionDigits:1,maximumFractionDigits:1});
 const cats={};recs.forEach(r=>{const c=cats[r.cat]=cats[r.cat]||{n:0,usd:0,wd:0,o90:0};c.n++;c.usd+=r.usd;c.wd+=r.usd*r.days;if(r.days>90)c.o90+=r.usd;});
 const rows=Object.keys(cats).map(c=>({cat:c,n:cats[c].n,usd:cats[c].usd,wd:cats[c].wd,o90:cats[c].o90,vnd:cats[c].usd*fx})).sort((a,b)=>b.vnd-a.vnd);
 const totV=rows.reduce((a,r)=>a+r.vnd,0),o90=rows.reduce((a,r)=>a+r.o90*fx,0);
 const totU=rows.reduce((a,r)=>a+r.usd,0);const totAge=totU?rows.reduce((a,r)=>a+r.wd,0)/totU:0;
 const tokens=qd.split(/[^a-z0-9$]+/).filter(t=>t.length>=4&&!/ngay|khoa|hang|danh/.test(t));
 const hit=rows.find(r=>tokens.some(t=>deacc(r.cat).indexOf(t)>-1));
 if(hit)return `<b>${hit.cat}</b>: tồn ${fmt(hit.n)} code = <b>${fmt(hit.vnd)} đ</b> (${pct(hit.vnd/(totV||1))} giá trị kho); tuổi BQ ${f1(hit.usd?hit.wd/hit.usd:0)} ngày; giá trị >90 ngày ${fmt(hit.o90*fx)} đ (${pct(hit.o90*fx/(hit.vnd||1))}).`;
 if(/\b90\b/.test(qd)){const tops=rows.filter(r=>r.o90>0).sort((a,b)=>b.o90-a.o90).slice(0,5);
  return `Tồn quá 90 ngày: <b>${fmt(o90)} đ</b> (${pct(o90/(totV||1))} giá trị kho).${tops.length?`<div class="scroll" style="max-height:220px;margin-top:8px"><table class="tbl"><thead><tr><th>Danh mục</th><th class="n">Giá trị >90n (đ)</th></tr></thead><tbody>${tops.map(r=>`<tr><td>${r.cat}</td><td class="n">${fmt(r.o90*fx)}</td></tr>`).join('')}</tbody></table></div>`:' Không có danh mục nào quá 90 ngày.'}`;}
 return `Tồn kho hiện tại: <b>${fmt(totV)} đ</b> · ${fmt(recs.length)} code · ${rows.length} danh mục; tuổi tồn BQ ${f1(totAge)} ngày; >90 ngày chiếm ${pct(o90/(totV||1))}. Lớn nhất: <b>${rows[0].cat}</b> (${pct(rows[0].vnd/(totV||1))}).`;}
async function askSLA(qd){const[Rn,Ry]=await Promise.all([slaRows('ngay'),slaRows('nam')]);
 const T=parseSlaThang(Rn),Y=parseSlaNam(Ry);
 const f1=n=>n.toLocaleString('vi-VN',{minimumFractionDigits:1,maximumFractionDigits:1});
 let h='';
 if(T){const fk=iso(FROM),tk=iso(TO);const days=T.dateCols.filter(dc=>dc.dk>=fk&&dc.dk<=tk);
  if(days.length){const sum=row=>row?days.reduce((a,dc)=>a+(row.daily[dc.dk]||0),0):0;
   const meanPos=row=>{if(!row)return 0;let sm=0,n=0;days.forEach(dc=>{const v=row.daily[dc.dk];if(v!=null&&v>0){sm+=v;n++;}});return n?sm/n:0;};
   const tong=b=>b&&(b.rows.find(r=>/^tổng/i.test(r.name))||b.rows[0]);
   const ps0=T.ps&&T.ps.rows[0],htT=tong(T.ht),ltT=tong(T.lt),pcT=tong(T.pc);
   const htS=sum(htT),ltM=meanPos(ltT),pcM=meanPos(pcT);
   h+=`Kỳ ${scopeLabel()} (${days.length} ngày): phát sinh ${fmt(sum(ps0))} đơn, hoàn tất <b>${fmt(htS)}</b> (${fmt(Math.round(htS/(days.length||1)))} đơn/ngày); lead time TB <b>${f1(ltM)} h</b> (<span class="${ltM<=4?'up':'down'}">${ltM<=4?'đạt':'vượt'} KPI ≤4h</span>); tỷ lệ đạt KPI lead time <b>${f1(pcM)}%</b>.`;
   if(/top|nhan su|nhan vien|\bai\b/.test(qd)&&T.ht){const stf=T.ht.rows.filter(r=>r.name&&!/^tổng/i.test(r.name)).map(st=>[st.name,sum(st)]).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]).slice(0,5);
    if(stf.length)h+=`<div class="scroll" style="max-height:200px;margin-top:8px"><table class="tbl"><thead><tr><th>Nhân sự</th><th class="n">Hoàn tất (kỳ lọc)</th></tr></thead><tbody>${stf.map(x=>`<tr><td>${x[0]}</td><td class="n">${fmt(x[1])}</td></tr>`).join('')}</tbody></table></div>`;}}
  else h+=`Tab "Theo tháng" không có ngày nào trong ${scopeLabel()} — chỉnh Từ–Đến trùm tháng đang báo cáo.`;}
 if(Y){const hiM=Y.yByM.indexOf(Math.max(...Y.yByM));
  const stf=[...Y.staff].sort((a,b)=>b.yr-a.yr).slice(0,3);
  h+=`${h?'<br>':''}Cả năm: <b>${fmt(Y.yTot)}</b> đơn · ${Y.staff.length} nhân sự · đỉnh T${pad2(hiM+1)} (${fmt(Y.yByM[hiM])}); top: ${stf.map(st=>st.name+' ('+fmt(st.yr)+')').join(' · ')}.`;}
 return h||'Chưa đọc được dữ liệu SLA (kiểm tra Nguồn & Cấu hình).';}
function askHelp(){return `Chưa nhận diện được câu hỏi. Bạn có thể hỏi kiểu:
 <ul style="margin:6px 0 0 18px;line-height:1.75">
 <li>“Nhập Robux tháng 6” · “Xuất Gift Card T5” · “Die tháng 2” · “Robux dồn”</li>
 <li>“So sánh T5 vs T6” · “So sánh Robux với Gift Card” · “Tỉ trọng nhập”</li>

 <li>“Tồn quá 90 ngày” · “Gross loss” · “Lead time” · “Top nhân sự xử lý đơn”</li></ul>`;}
async function askAnswer(q){
 try{
 const qn=(''+q).normalize('NFC').toLowerCase(),qd=deacc(q);
 const sp=askSp(qd),sps=askSps(qd),mos=askMonths(qd);
 /* không rõ chỉ số → chỉ mặc định "Nhập" khi câu có SPDV/tháng/ý so sánh; còn lại đưa gợi ý */
 const met0=askMetric(qn,qd);
 const met=met0||((sp||sps.length||mos.length||/so sanh|\bvs\b|cao nhat|thap nhat|lon nhat|nhieu nhat|ti trong|ty trong|co cau|spdv nao|loai nao|top/.test(qd))?'nhap':null);
 const tmn=Object.keys(monthsInRange()).map(Number).sort((a,b)=>a-b);
 if(met==='price')return await askPrice(qn,qd);
 if(met==='ton')return await askTon(qn,qd);
 if(met==='gv')return await askGV(qd,sp,mos);
 if(met==='sla')return await askSLA(qd);
 if(met==='gl'){const glM=tmn.map(mi=>{const n=monthNhap(mi)||0;const d=Object.keys(DIE).reduce((a,sx)=>a+((DIE[sx]&&DIE[sx][mi])||0),0);return n?d/n:0;});
  const sc=scopeData();const st=insSeries(glM);
  return `Gross Loss ${scopeLabel()} = <b>${pct(sc.totalDie/(sc.totalNhap||1))}</b> (thiệt hại ${fmt(sc.totalDie)} trên CO Nhập ${fmt(sc.totalNhap)})${tmn.length>1&&st?`; cao nhất ${insT(tmn,st.hi)} (${pct(glM[st.hi])}), thấp nhất ${insT(tmn,st.lo)} (${pct(glM[st.lo])})`:''}.`;}
 if(met==='don'){const v=tmn.reduce((a,mi)=>a+(DON.Robux[mi]||0),0);const vals=tmn.map(mi=>DON.Robux[mi]||0);const st=insSeries(vals);const sc=scopeData();
  return `Robux Dồn (thu hồi) ${scopeLabel()} = <b>${fmt(v)}</b>${tmn.length>1&&st?`; cao nhất ${insT(tmn,st.hi)} (${fmt(vals[st.hi])})${st.mom!=null?`; tháng gần nhất ${insUD(st.mom)}`:''}`:''}; bù lại ${pct(v/((v+sc.totalDie)||1))} tổng die+dồn.`;}
 const topM=qd.match(/top\s*(\d+)?/);
 const wantNcc=/\bncc\b|nha cung cap/.test(qd),wantNv=/nhan vien|\bnv\b|nhan su/.test(qd);
 if((wantNcc||wantNv)&&(topM||/lon nhat|cao nhat|nhieu nhat|dan dau/.test(qd)))return askTopGroup(wantNv?'nv':'ncc',sp,topM&&topM[1]?Math.min(20,+topM[1]):5,tmn);
 const hit=askFindName(qd);if(hit)return askGroupName(hit,tmn);
 if(/so sanh|\bvs\b|so voi/.test(qd)){
  if(mos.length>=2)return askCompareMonths(met,sp,mos[0],mos[1]);
  if(sps.length>=2)return askCompareSp(met,sps[0],sps[1],tmn);}
 if(/spdv nao|loai nao|san pham nao/.test(qd)&&ASK_MET[met]){
  const rows=SPDV.map(sx=>[sx,tmn.reduce((a,mi)=>a+askVal(met,sx,mi),0)]).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]);
  if(!rows.length)return `Không có ${ASK_MET[met].label} phát sinh trong ${scopeLabel()}.`;
  const tot=rows.reduce((a,x)=>a+x[1],0);
  return `${ASK_MET[met].label} (${scopeLabel()}): cao nhất <b>${rows[0][0]}</b> (${fmt(rows[0][1])} = ${pct(rows[0][1]/tot)}); thấp nhất trong nhóm có phát sinh: <b>${rows[rows.length-1][0]}</b> (${fmt(rows[rows.length-1][1])}).`;}
 if(/cao nhat|lon nhat|\bdinh\b|thap nhat|nho nhat|\bday\b/.test(qd)&&ASK_MET[met])return askPeak(met,sp,tmn);
 if(/ti trong|ty trong|co cau/.test(qd)&&ASK_MET[met]){
  const shr=SPDV.map(sx=>[sx,tmn.reduce((a,mi)=>a+askVal(met,sx,mi),0)]).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]);
  const tot=shr.reduce((a,x)=>a+x[1],0);
  if(!tot)return `Không có ${ASK_MET[met].label} phát sinh trong ${scopeLabel()}.`;
  return `Cơ cấu ${ASK_MET[met].label} (${scopeLabel()}): ${shr.map(x=>`${shortSP(x[0])} <b>${pct(x[1]/tot)}</b>`).join(' · ')}.`;}
 if(met&&ASK_MET[met]){
  if(mos.length>=2)return askCompareMonths(met,sp,mos[0],mos[1]);
  return askValue(met,sp,mos,tmn);}
 return askHelp();
 }catch(e){return 'Không xử lý được câu hỏi ('+(e&&e.message?e.message:e)+') — thử hỏi theo mẫu gợi ý.';}}

const ASK_HINTS={
 TQ:["Tháng nào nhập cao nhất?","So sánh T5 vs T6","Tỉ trọng nhập","SPDV nào die nhiều nhất?"],
 PVH1:["Top 5 NCC Gift Card","SEAGM nhập bao nhiêu?","Top 3 NCC Robux"],
 PVH2:["Die tháng nào cao nhất?","Robux dồn","So sánh die T5 vs T6"],
 PVH3:["Top 5 nhân viên Gift Card","Top nhân viên Topup"],
 PVH4:["Giá vốn Robux tháng 7","Giá vốn Razer Gold"],
 PVH5:["NCC nào rẻ nhất?","SKU nào chênh giá nhất?"],
 PVH6:["Tồn quá 90 ngày","Tồn kho hiện tại"],
 PVH8:["Gross loss","Die tháng nào cao nhất?"],

 PVH11:["SPDV nào lỗi cao nhất?","Gross loss"],

function askOpen(){const w=document.getElementById('askwrap');if(!w)return;w.style.display='block';
 const hints=ASK_HINTS[curr]||ASK_HINTS.TQ;
 document.getElementById('askchips').innerHTML='<span class="small" style="align-self:center">Gợi ý:</span>'+hints.map(hh=>`<button class="pbtn" onclick="askAsk(this.textContent)">${hh}</button>`).join('');
 setTimeout(()=>{const i=document.getElementById('askinp');if(i)i.focus();},60);}
function askClose(){const w=document.getElementById('askwrap');if(w)w.style.display='none';}
function askAsk(q){const i=document.getElementById('askinp');i.value=q;askGo();}
let ASKN=0;
async function askGo(){const i=document.getElementById('askinp');const q=(i.value||'').trim();if(!q)return;
 const log=document.getElementById('asklog');const id='ask'+(++ASKN);
 log.insertAdjacentHTML('afterbegin',`<div class="askans" id="${id}"><div class="askq">❓ ${q.replace(/</g,'&lt;')}</div><div class="askbody"><span class="spin" style="width:15px;height:15px;border-width:2px;display:inline-block;vertical-align:-3px"></span> Đang tra cứu dữ liệu…</div></div>`);
 i.value='';i.focus();
 let html;try{html=await askAnswer(q);}catch(e){html='Lỗi: '+(e&&e.message?e.message:e);}
 const el=document.querySelector('#'+id+' .askbody');if(el)el.innerHTML=html;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')askClose();});
function toggleMenu(v){const b=document.body;if(v===false)b.classList.remove('menuopen');else if(v===true)b.classList.add('menuopen');else b.classList.toggle('menuopen');}
function go(id){if(!canSee(id)){id=firstPage();} /* chặn vào trang ngoài quyền */
 toggleMenu(false); /* mobile: chọn trang xong tự đóng menu */
 curr=id;destroy();document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
 renderFilters();
 document.getElementById('upd').textContent="Cập nhật "+new Date().toLocaleTimeString('vi-VN');
 if(id==="SRC"){document.getElementById('rtitle').textContent="Nguồn & Cấu hình";document.getElementById('rmeta').innerHTML="Đọc trực tiếp Google Sheet (publish CSV) · /api/csv là dự phòng";renderSRC();return;}
 render();}
function startApp(){buildNav();go(firstPage());loadLive();setInterval(loadLive,60000);}
