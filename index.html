/* ===== BГҒO CГҒO Dбә NG "KHб»җI THEO SPDV, Mб»–I DГ’NG Mб»ҳT TГҠN" вҖ” dГ№ng chung PVH1 (NCC) & PVH3 (NhГўn viГӘn) ===== */
const GRP={};
function grpRetry(k){if(GRP[k]){GRP[k].failed=0;GRP[k].loading=0;}render();}
function renderGroupReport(host,cfg){
 const S=GRP[cfg.skey]=GRP[cfg.skey]||{};
 const src=cfg.src(),tots=cfg.tots();
 const sps=Object.keys(src).filter(s=>src[s]&&src[s].length);
 if(!sps.length){
   if(S.failed){
     const sample=S.rows||[];
     const prev=sample.length?`<div class="card" style="margin-top:12px"><h3>Dб»Ҝ liб»Үu thГҙ Д‘б»Қc vб»Ғ (10 dГІng Д‘бә§u Г— 12 cб»ҷt) вҖ” chб»Ҙp mГ n hГ¬nh gб»ӯi lбәЎi nбәҝu vбә«n lб»—i</h3><div class="scroll"><table class="tbl"><thead><tr><th>#</th>${Array.from({length:12},(_,c)=>`<th>${String.fromCharCode(65+c)}</th>`).join('')}</tr></thead><tbody>${sample.slice(0,10).map((r,i)=>`<tr><td>${i+1}</td>${Array.from({length:12},(_,c)=>`<td>${((''+((r||[])[c]??'')).slice(0,18))}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`:'';
     host.innerHTML=`<div class="note"><b>KhГҙng Д‘б»Қc Д‘Ж°б»Јc ${cfg.name} thГ nh sб»‘ liб»Үu.</b><br>Chбә©n Д‘oГЎn: ${S.diag||'(chЖ°a cГі)'}<br>Parser cбә§n: mб»ҷt cб»ҷt chб»©a tГӘn SPDV (Robux, Gift CardвҖҰ) mб»ҹ tб»«ng khб»‘i kГЁm hГ ng tб»•ng, cб»ҷt kбәҝ bГӘn lГ  tГӘn ${cfg.unit}, vГ  hГ ng tiГӘu Д‘б»Ғ thГЎng (ThГЎng 01 / T01 / 01/2026вҖҰ). Nбәҝu sai gid, sб»ӯa hбәұng GIDS trong index.html.<br><button class="btn" style="margin-top:8px" onclick="grpRetry('${cfg.skey}')">вҶ» Thб»ӯ lбәЎi</button></div>${prev}`;return;}
   host.innerHTML=spinner("Дҗang tбәЈi "+cfg.name+"вҖҰ");
   if(!S.loading){S.loading=1;
     fetchGid(cfg.gid,VAL_NCC).then(rows=>{
      if(rows){S.rows=rows.slice(0,10);const N=parseNCC(rows);const nsp=Object.keys(N.data).filter(sp=>N.data[sp].length).length;
        S.diag='Д‘б»Қc Д‘Ж°б»Јc '+rows.length+' dГІng В· nhбәӯn diб»Үn '+nsp+' khб»‘i SPDV В· cб»ҷt thГЎng: '+(monthCols(rows)?'tб»ұ dГІ Д‘Ж°б»Јc':'dГ№ng mбә·c Д‘б»Ӣnh');
        cfg.apply(rows);}
      else S.diag='khГҙng Д‘б»Қc Д‘Ж°б»Јc вҖ” Google trбәЈ vб»Ғ trang HTML/lб»—i thay vГ¬ CSV. KhбәЈ nДғng cao tab CHЖҜA Д‘Ж°б»Јc Д‘Ж°a vГ o Publish to web (Tб»Үp в–ё Chia sбә» в–ё XuбәҘt bбәЈn lГӘn web в–ё chб»Қn ToГ n bб»ҷ tГ i liб»Үu hoбә·c thГӘm tab nГ y) В· gid Д‘ang dГ№ng: '+cfg.gid;
      S.loading=0;S.failed=!Object.keys(cfg.src()).length;if(curr===cfg.page)render();}).catch(e=>{S.diag='Lб»—i fetch: '+(e&&e.message?e.message:e);S.loading=0;S.failed=1;if(curr===cfg.page)render();});}
   return;}
 const tmn=Object.keys(monthsInRange()).map(Number).sort((a,b)=>a-b);
 /* gom sб»‘ mб»ҷt lбә§n: dГ№ng cho cбәЈ Гҙ KPI tб»•ng б»ҹ trГӘn lбә«n card chi tiбәҝt б»ҹ dЖ°б»ӣi */
 const agg={};
 sps.forEach(sp=>{const list=src[sp].map(x=>[x[0],tmn.reduce((a,mi)=>a+(x[1][mi]||0),0),x[1]]).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]);
   const tot=list.reduce((a,x)=>a+x[1],0);
   const sheetT=tots[sp]?tmn.reduce((a,mi)=>a+(tots[sp][mi]||0),0):null;
   /* Гҙ tб»•ng hiб»ғn thб»Ӣ THEO HГҖNG Tб»”NG SHEET khi khб»‘i cГі hГ ng tб»•ng; cб»ҷng chi tiбәҝt chб»ү dГ№ng Д‘б»‘i soГЎt */
   agg[sp]={list,tot,sheetT,disp:sheetT!=null?sheetT:tot};});
 let h=`<div class="small" style="margin-bottom:10px">PhбәЎm vi ${scopeLabel()} В· CO Nhбәӯp theo ${cfg.unit} (cб»ҷng trб»Қn thГЎng chбәЎm khoбәЈng: ${tmn.map(m=>'T'+(m+1)).join('+')}) В· ${sps.length} SPDV В· bбәҘm <b>CбәЈ kб»і</b> Д‘б»ғ khб»ӣp cб»ҷt "2026"</div>`;
 h+=`<div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))">${sps.map(sp=>kpi('Tб»•ng CO Nhбәӯp В· '+sp,fmt(agg[sp].disp),agg[sp].list.length+' '+cfg.unit+' В· top: '+(agg[sp].list[0]?agg[sp].list[0][0]:'вҖ”')+(agg[sp].sheetT!=null?' В· theo hГ ng tб»•ng sheet':''))).join('')}</div>`;
 h+='<div class="grid2">';
 sps.forEach((sp,idx)=>{
   const list=agg[sp].list,tot=agg[sp].tot,sheetT=agg[sp].sheetT;
   const diff=sheetT!=null?tot-sheetT:null;
   /* 3 mб»©c Д‘б»‘i soГЎt: khб»ӣp tuyб»Үt Д‘б»‘i (xanh) В· lб»Үch nhб»Ҹ вүӨ0.1% (vГ ng) В· lб»Үch lб»ӣn (Д‘б»Ҹ) */
   let dsHtml='';
   if(sheetT!=null){
     if(diff===0)dsHtml=`<div class="small" style="text-align:center;margin:-4px 0 6px;color:#0f7a4d">Дҗб»‘i soГЎt: cб»ҷng ${cfg.unit} ${fmt(tot)} вң“ khб»ӣp tuyб»Үt Д‘б»‘i hГ ng tб»•ng sheet</div>`;
     else if(Math.abs(diff)<=Math.max(1,Math.round((sheetT||0)*0.001)))dsHtml=`<div class="small" style="text-align:center;margin:-4px 0 6px;color:#8a5b12">Дҗб»‘i soГЎt: cб»ҷng ${cfg.unit} ${fmt(tot)} вүҲ hГ ng tб»•ng sheet ${fmt(sheetT)} (lб»Үch nhб»Ҹ ${fmt(Math.abs(diff))} В· ${pct(Math.abs(diff)/(sheetT||1))})</div>`;
     else dsHtml=`<div class="small" style="text-align:center;margin:-4px 0 6px;color:#b91c1c;font-weight:bold">Дҗб»‘i soГЎt: cб»ҷng ${cfg.unit} ${fmt(tot)} вү  hГ ng tб»•ng sheet ${fmt(sheetT)} (lб»Үch ${fmt(diff)}) вҖ” hГ ng tб»•ng khб»‘i nГ y cГі thб»ғ khГҙng phбәЈi tб»•ng cб»ҷng ${cfg.unit}</div>`;}
   h+=`<div class="card"><h3>${sp} вҖ” ${list.length} ${cfg.unit} В· ${fmt(agg[sp].disp)}</h3>
     ${dsHtml}
     <div class="chartbox sm"><canvas id="${cfg.pfx}_${idx}"></canvas></div>
     <div class="small" style="text-align:center;margin-top:4px">Biб»ғu Д‘б»“: top 10 В· bбәЈng dЖ°б»ӣi: Д‘бә§y Д‘б»§ ${list.length} ${cfg.unit}</div>
     <div class="scroll" style="max-height:280px;margin-top:6px"><table class="tbl"><thead><tr><th>${cfg.unit}</th>${tmn.map(mi=>`<th class="n">T${pad2(mi+1)}</th>`).join('')}<th class="n">Tб»•ng</th><th class="n">%</th></tr></thead><tbody>
     ${list.map(x=>`<tr><td>${x[0]}</td>${tmn.map(mi=>`<td class="n">${fmtn(x[2][mi])}</td>`).join('')}<td class="n"><b>${fmtn(x[1])}</b></td><td class="n">${pct(x[1]/(tot||1))}</td></tr>`).join('')}
     <tr style="font-weight:bold;background:#eef4ff"><td>Cб»ҷng ${list.length} ${cfg.unit}</td>${tmn.map(mi=>`<td class="n">${fmtn(list.reduce((a,x)=>a+(x[2][mi]||0),0))}</td>`).join('')}<td class="n">${fmtn(tot)}</td><td class="n">100%</td></tr>
     ${sheetT!=null?`<tr style="font-weight:bold;color:#0b3a8f;background:#eef4ff"><td>HГ ng tб»•ng trГӘn sheet</td>${tmn.map(mi=>`<td class="n">${fmtn(tots[sp][mi])}</td>`).join('')}<td class="n">${fmtn(sheetT)}</td><td class="n">вҖ”</td></tr>`:''}
     </tbody></table></div></div>`;});
 h+='</div>';host.innerHTML=h;
 sps.forEach((sp,idx)=>{const list=agg[sp].list.slice(0,10);mk(cfg.pfx+"_"+idx,{type:'bar',data:{labels:list.map(x=>x[0]),datasets:[{data:list.map(x=>x[1]),backgroundColor:list.map((_,i)=>i===0?'#0b3a8f':(i<4?'#1e5fd0':'#4aa8f0'))}]},options:hbarOpt()});});
}

/* ===== CГҒCH B: Д‘б»Қc raw gom theo NGГҖY (bбәҜt Д‘бә§u: Robux вҖ” Д‘б»“ng, ngГ y sбәЎch) ===== */
const RAWURL_ROBUX=BASE+"?gid=562469906&single=true&output=csv";
let DAILY={nhap:{},xuat:{},die:{},don:{},_donLoaded:false};
let RAWLOADED={};
function pad(n){return(''+n).padStart(2,'0');}
function dkey(m,d){return '2026-'+pad(m+1)+'-'+pad(d);}
function pad2(n){return(''+n).padStart(2,'0');}
function iso(o){return o.y+'-'+pad2(o.mo+1)+'-'+pad2(o.d);}
function parseISO(x){const p=x.split('-');return{y:+p[0],mo:+p[1]-1,d:+p[2]};}
function clampD(o){let t=new Date(o.y,o.mo,o.d);const mn=new Date(2026,0,1),mx=new Date(2026,11,31);if(t<mn)t=mn;if(t>mx)t=mx;return{y:t.getFullYear(),mo:t.getMonth(),d:t.getDate()};}
function setRange(from,to){if(from)FROM=clampD(parseISO(from));if(to)TO=clampD(parseISO(to));
 const a=new Date(FROM.y,FROM.mo,FROM.d),b=new Date(TO.y,TO.mo,TO.d);if(a>b){const t=FROM;FROM=TO;TO=t;}
 const ff=document.getElementById('fFrom'),ft=document.getElementById('fTo');if(ff)ff.value=iso(FROM);if(ft)ft.value=iso(TO);
 applyFilter();}
function preset(k){const t=today();const mx=new Date(t.y,t.mo,t.d);
 if(k==='y'){FROM={y:t.y,mo:0,d:1};TO=t;}
 else if(k==='m'){FROM={y:t.y,mo:t.mo,d:1};TO=t;}
 else{const f=new Date(mx);f.setDate(f.getDate()-(k-1));FROM={y:f.getFullYear(),mo:f.getMonth(),d:f.getDate()};TO=t;}
 const ff=document.getElementById('fFrom'),ft=document.getElementById('fTo');if(ff)ff.value=iso(FROM);if(ft)ft.value=iso(TO);
 applyFilter();}
function rangeDays(){const out=[];const a=new Date(FROM.y,FROM.mo,FROM.d),b=new Date(TO.y,TO.mo,TO.d);for(let t=new Date(a);t<=b;t.setDate(t.getDate()+1))out.push({y:t.getFullYear(),mo:t.getMonth(),d:t.getDate()});return out;}
function monthsInRange(){const mm={};rangeDays().forEach(x=>{if(x.y===2026&&x.mo<12)mm[x.mo]=(mm[x.mo]||0)+1;});return mm;}
function aggArr(arr,sp,map,seed){if(map&&sp&&map[sp]){let t=0;rangeDays().forEach(x=>{if(x.y===2026)t+=map[sp][dkey(x.mo,x.d)]||0;});return t;}const mm=monthsInRange();let t=0;for(const m in mm){const mi=+m;t+=(arr&&arr[mi]?arr[mi]:0)*mm[m]/DAYS_IN[mi];}return Math.round(t);}
function parseFX(rows){const map={};for(let r=0;r<rows.length;r++){const row=rows[r]||[];const dt=parseDateCell(row[1]);const rate=num(row[2]);if(dt&&rate>0)map[dkey(dt.mo,dt.d)]=rate;}if(Object.keys(map).length){FXMAP=map;FXKEYS=Object.keys(map).sort();}}
function fxRate(key){if(FXMAP[key])return FXMAP[key];let best=0;for(const k of FXKEYS){if(k<=key)best=FXMAP[k];else break;}if(best)return best;return FXKEYS.length?FXMAP[FXKEYS[0]]:0;}
function parseDateCell(v){if(v==null)return null;v=(''+v).trim();let m=v.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);if(m)return{mo:+m[2]-1,d:+m[3]};m=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m){let a=+m[1],b=+m[2],mo,dd;if(a>12){dd=a;mo=b;}else if(b>12){mo=a;dd=b;}else{dd=a;mo=b;}return{mo:mo-1,d:dd};}const dt=new Date(v);return isNaN(dt)?null:{mo:dt.getMonth(),d:dt.getDate()};}
function hIdx(rows,need){for(let r=0;r<Math.min(rows.length,15);r++){const row=(rows[r]||[]).map(x=>(''+x).trim());if(need.every(n=>row.includes(n))){const i={};row.forEach((v,c)=>{if(!(v in i))i[v]=c;});return{r,i};}}return{r:-1,i:{}};}
function findc(row,re){if(!row)return -1;for(let c=0;c<row.length;c++)if(re.test((''+row[c]).trim()))return c;return -1;}
function buildRobux(rows){const H=hIdx(rows,['NGГҖY NHбә¬P','THГҖNH TIб»ҖN']);if(H.r<0)return false;const iD=H.i['NGГҖY NHбә¬P'],iT=H.i['THГҖNH TIб»ҖN'];const iDie=findc(rows[H.r],/tiб»Ғn rb die|die.*(kbh|khГҙng)/i);const iDon=findc(rows[H.r],/tiб»Ғn robux dб»“n/i);
 DAILY.nhap['Robux']={};DAILY.die['Robux']={};DAILY.don={};DAILY._donLoaded=true;
 for(let r=H.r+1;r<rows.length;r++){const row=rows[r];if(!row)continue;const dt=parseDateCell(row[iD]);if(!dt||dt.mo<0||dt.mo>11)continue;const k=dkey(dt.mo,dt.d);
  DAILY.nhap['Robux'][k]=(DAILY.nhap['Robux'][k]||0)+num(row[iT]);
  if(iDie>=0)DAILY.die['Robux'][k]=(DAILY.die['Robux'][k]||0)+num(row[iDie]);
  if(iDon>=0)DAILY.don[k]=(DAILY.don[k]||0)+num(row[iDon]);}
 return true;}

function fetchRaw(key){if(RAWDATA[key])return Promise.resolve(RAWDATA[key]);if(RAWSTATE[key])return RAWSTATE[key];
 const cfg=RAWCFG[key];
 /* thб»ӯ Google trб»ұc tiбәҝp; parse khГҙng ra bбәЈn ghi nГ o (lб»Үch cб»ҷt/nhбә§m tab) thГ¬ thб»ӯ /api/csv */

function groupSum(key,field){const o={};recsIn(key).forEach(r=>{const k=r[field]||'(trб»‘ng)';o[k]=(o[k]||0)+r.valv;});return Object.entries(o).filter(x=>x[0]!=='(trб»‘ng)').sort((a,b)=>b[1]-a[1]);}

function monthlyAvgUnit(key){const cfg=RAWCFG[key];const sum=Array(12).fill(0),cnt=Array(12).fill(0);
 (RAWDATA[key]||[]).forEach(r=>{if(!(r.unit>0))return;const mo=+r.dk.slice(5,7)-1;if(mo<0||mo>11)return;const u=cfg.usd?r.unit*fxRate(r.dk):r.unit;if(!(u>0))return;sum[mo]+=u;cnt[mo]++;});
 return sum.map((s,i)=>cnt[i]?Math.round(s/cnt[i]):0);}
/* PVH9: Д‘ЖЎn Bot vs thб»§ cГҙng tб»« Data Razergold вҖ” tб»ұ dГІ cб»ҷt chб»©a giГЎ trб»Ӣ Bot/Tay */
let RAZERRECS;
function botRecsFromRows(rows){
 if(!rows||rows.length<2)return null;
 const isBot=v=>/^bot/i.test(v),isTay=v=>/^(tay|th[uб»§]\s*c[oГҙ]ng|manual)/i.test(v);
 let best=-1,bestHits=0;const width=Math.max(...rows.slice(0,60).map(r=>(r||[]).length),0);
 for(let c=0;c<width;c++){let hits=0,bot=0;
  for(let r=1;r<rows.length;r++){const v=(''+((rows[r]||[])[c]||'')).trim();if(!v)continue;if(isBot(v)){hits++;bot++;}else if(isTay(v))hits++;}
  if(hits>bestHits&&bot>0){bestHits=hits;best=c;}}
 if(best<0)return null;
 const recs=[];
 for(let r=1;r<rows.length;r++){const row=rows[r]||[];const dt=parseDateCell(row[RAWCFG.razer.date]);if(!dt||dt.mo<0||dt.mo>11)continue;
  const v=(''+(row[best]||'')).trim();if(!v)continue;
  if(isBot(v))recs.push({dk:dkey(dt.mo,dt.d),bot:1});else if(isTay(v))recs.push({dk:dkey(dt.mo,dt.d),bot:0});}
 return recs.length?recs:null;}
