<style>

}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,"Segoe UI",sans-serif;color:#e7effb;min-width:1220px;

 background-attachment:fixed;}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;

.presets{display:flex;gap:5px}
.pbtn{background:rgba(30,95,208,.28);color:#cfe0f0;border:1px solid rgba(120,180,255,.3);border-radius:8px;padding:6px 9px;font-size:11px;font-weight:bold;cursor:pointer}

.center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;color:#9fb4d3;gap:12px}

@keyframes spin{to{transform:rotate(360deg)}}
</style>

<body>
<div id="login" class="loginwrap">

<div class="layout">
  <div class="side">

<script>

/* ============ CẤU HÌNH NỐI DỮ LIỆU THẬT (bước sau) ============
   Dán link CSV publish của sheet L2_TONGHOP vào CSV_L2.
   Khi có link, thay số nhúng bên dưới bằng dữ liệu live. ============ */
const CSV_L2 = "";  // <-- dán link CSV publish sheet L2_TONGHOP tại đây

/* ===== ĐĂNG NHẬP (hash SHA-256, không lưu mật khẩu nguyên văn) ===== */
const AUTH_EMAIL="vanhanh@hqgroups.vn";
const AUTH_HASH="52c1966f11081859a47a12b72e7a9c82215fe10663c553a2f2a0a678b9aba6e4";
async function sha256(t){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
async function doLogin(){const em=(document.getElementById('lgEmail').value||'').trim().toLowerCase();const pw=document.getElementById('lgPass').value||'';let h='';try{h=await sha256(pw);}catch(e){document.getElementById('lgErr').textContent="Trình duyệt chặn mã hoá (hãy mở qua https/Vercel).";return;}
 if(em===AUTH_EMAIL&&h===AUTH_HASH){try{sessionStorage.setItem('pvh_auth','1')}catch(e){}showApp();}
 else document.getElementById('lgErr').textContent="Email hoặc mật khẩu không đúng.";}
function showApp(){const l=document.getElementById('login');if(l)l.style.display='none';if(!window.__started){window.__started=true;startApp();}}
document.addEventListener('keydown',e=>{const l=document.getElementById('login');if(e.key==='Enter'&&l&&l.style.display!=='none')doLogin();});

/* ===== DỮ LIỆU THẬT (cấp tháng) ===== */
const SPDV=["Robux","Token","Gift Card","Nick Random Roblox","Razer Gold","RBX","Topup"];
const MN=["T01","T02","T03","T04","T05","T06"];
const DAYS_IN=[31,28,31,30,31,30];
let NHAP={"Robux":[2680000000,1234329434,1383904463,952103845,1097973356,550329586],"Token":[34039650,16751710,33309990,12030908,8341155,0],"Gift Card":[3216768660,1672489620,2380101840,3166903440,3221131050,1952709390],"Nick Random Roblox":[76676000,122800439,57564641,51863489,88906261,86096418],"Razer Gold":[0,0,618724980,880444890,889391070,195431940],"RBX":[54000000,54000000,54000000,54000000,54000000,54000000],"Topup":[0,0,0,0,0,0]};
let XUAT={"Robux":[2600000000,1200000000,1350000000,940000000,1080182179,520000000],"Token":[34039650,16751710,33309990,12030908,8341155,0],"Gift Card":[3253787550,1700000000,2400000000,3200000000,3310651170,1900000000],"Nick Random Roblox":[90940500,110000000,60000000,60000000,79372688,96864842],"Razer Gold":[0,0,600000000,870000000,889391070,190000000],"RBX":[23748390,40000000,50000000,55000000,61872660,29643570],"Topup":[0,0,0,0,0,0]};
let DIE={"Robux":[13121425,18638474,1522295,3998836,2205367,1008150],"Nick Random Roblox":[530000,700000,300000,250000,167000,774630],"Razer Gold":[0,0,1500000,2000000,2693790,182250],"Gift Card":[3331800,2000000,1500000,1000000,532980,400000],"RBX":[0,0,1000000,1200000,1677240,1620000]};
let DON={"Robux":[0,0,5000000,8000000,14858825,10360599]};
let NCC_ROBUX=[["Tuấn Trần",196874194],["Hồ Tấn Đại",127537426],["Huỳnh Khương",69994288],["rbxlegit.com",37869412],["Trọng Tín",12951370],["Duy Lý",5769242],["Thành Nam",4237860],["Trần Toàn",2297341],["Thanh Nguyễn",918669],["Thuận Nguyễn",206761]];
const STAFF=[["DiuNT",2689],["TungNVM",1114],["TienHT",1075],["LinhPTT",331],["NamDT",160],["TuanPA",93],["SimLH",22]];
const NICK_ST=[["HOÀN THÀNH",21719],["Chưa bán",724],["DIE",637],["ĐÃ XỬ LÝ",583],["ĐÃ HOÀN TIỀN",124]];
const OG={success:2940,refund:155,api:1981,web:1114};
const RAZER={bot:234,tay:9};

/* ============ REALTIME: đọc 2 tab TỔNG HỢP an toàn (không nối raw nhạy cảm) ============ */
const BASE="https://docs.google.com/spreadsheets/d/e/2PACX-1vSve6XRHg5gWRzqkazHm5zvlrkTkAMLa7TJms_U-ebAFcrDAmcvCYfNJ50hrvV988tXyKC7q70LQgPc/pub";
const CSV={ spdv:BASE+"?gid=460836856&single=true&output=csv", ncc:BASE+"?gid=1758921427&single=true&output=csv", fx:BASE+"?gid=163849763&single=true&output=csv" };
let NCC_ALL={};
let FXMAP={},FXKEYS=[];
let LIVE=false;
function num(x){if(x==null)return 0;x=(''+x).replace(/["\s₫đ$%]/g,'');if(x===''||x==='-')return 0;
 if(x.indexOf(',')>-1&&x.indexOf('.')===-1){x=x.replace(/\./g,'').replace(',','.');}
 else{if((x.match(/\./g)||[]).length>1)x=x.replace(/\./g,'');x=x.replace(/,/g,'');}
 const n=parseFloat(x);return isNaN(n)?0:n;}
function papa1(url){return new Promise(res=>{try{Papa.parse(url,{download:true,complete:r=>res(r.data&&r.data.length?r.data:null),error:()=>res(null)});}catch(e){res(null);}});}
async function loadCSV(url){let d=await papa1(url);if(d&&d.length>1)return d;try{const px="https://api.allorigins.win/raw?url="+encodeURIComponent(url);d=await papa1(px);}catch(e){}return d;}
function fetchCSV(url){return loadCSV(url);}
const MFULL=["Tháng 01","Tháng 02","Tháng 03","Tháng 04","Tháng 05","Tháng 06","Tháng 07","Tháng 08","Tháng 09","Tháng 10","Tháng 11","Tháng 12"];
function monIdx(t){t=(''+t).trim();let m=t.match(/th[aá]ng\s*(\d{1,2})/i);if(m)return +m[1]-1;m=t.match(/^(\d{1,2})\/\d{4}$/);if(m)return +m[1]-1;m=t.match(/^T(\d{1,2})$/i);if(m)return +m[1]-1;return -1;}
function parseSPDV(rows){let mrow=-1,col={};
 for(let r=0;r<rows.length;r++){if((rows[r]||[]).some(x=>monIdx(x)>=0)){mrow=r;break;}}
 if(mrow>=0)rows[mrow].forEach((v,c)=>{const mi=monIdx(v);if(mi>=0&&!(mi in col))col[mi]=c;});
 const lab=kw=>{for(let r=0;r<rows.length;r++)if((rows[r]||[]).some(x=>(''+x).trim().toLowerCase()===kw.toLowerCase()))return r;return -1;};
 const iN=lab("Tổng CO Nhập"),iX=lab("Tổng CO Xuất"),iT=lab("Thiệt hại");
 const blk=(a,b)=>{const m={};for(let r=a+1;r<(b<0?rows.length:b);r++){const row=rows[r]||[];const L=(''+(row[3]||'')).trim();if(L)m[L]=row;}return m;};
 const nhap=blk(iN,iX),xuat=blk(iX,iT),th=blk(iT,-1);
 const val=(m,L,mi)=>{const row=m[L];if(!row)return 0;const c=col[mi];return c==null?0:num(row[c]);};
 const K=Object.keys(th);
 const thiethai=(sp,mi)=>{const f=fn=>{const k=K.find(fn);return k?val(th,k,mi):0;};
   if(sp==="Robux")return f(k=>/robux/i.test(k)&&/die/i.test(k));
   if(sp==="Gift Card")return f(k=>/gift/i.test(k)&&/lỗi/i.test(k))||f(k=>/gift/i.test(k));
   if(sp==="Nick Random Roblox")return f(k=>/nick/i.test(k)&&/die/i.test(k));
   if(sp==="Razer Gold")return f(k=>/razer/i.test(k));
   if(sp==="RBX")return f(k=>/rbx/i.test(k));return 0;};
 const don=mi=>{const k=K.find(k=>/dồn/i.test(k));return k?val(th,k,mi):0;};
 return {val,nhap,xuat,thiethai,don};}
function parseNCC(rows){let mrow=-1,col={};
 for(let r=0;r<rows.length;r++){if((rows[r]||[]).some(x=>monIdx(x)>=0)){mrow=r;break;}}
 if(mrow>=0)rows[mrow].forEach((v,c)=>{const mi=monIdx(v);if(mi>=0&&!(mi in col))col[mi]=c;});
 const data={};let cur=null;
 for(let r=mrow+1;r<rows.length;r++){const row=rows[r]||[];const sp=(''+(row[2]||'')).trim(),ncc=(''+(row[3]||'')).trim();
  if(SPDV.includes(sp)){cur=sp;data[cur]=[];}else if(ncc&&cur&&!/^Tổng/i.test(ncc))data[cur].push(row);}
 return {data,col};}
function applyLive(a,b){let ok=false;
 if(a&&a.length){const P=parseSPDV(a);let hit=false;
   SPDV.forEach(sp=>{for(let i=0;i<6;i++){const v=P.val(P.nhap,sp,i);if(v)hit=true;NHAP[sp][i]=v;XUAT[sp]=XUAT[sp]||[0,0,0,0,0,0];XUAT[sp][i]=P.val(P.xuat,sp,i)||P.val(P.xuat,sp==="Token"?"Item (Token)":sp,i);if(DIE[sp])DIE[sp][i]=P.thiethai(sp,i);}});
   for(let i=0;i<6;i++)DON.Robux[i]=P.don(i);ok=hit;}
 if(b&&b.length){const N=parseNCC(b);const all={};Object.keys(N.data).forEach(sp=>{const arr=N.data[sp].map(row=>{const vals=[];for(let i=0;i<6;i++){const c=N.col[i];vals.push(c!=null?num(row[c]):0);}return[(''+(row[3]||'')).trim(),vals];}).filter(x=>x[0]&&x[1].some(v=>v>0));if(arr.length)all[sp]=arr;});if(Object.keys(all).length){NCC_ALL=all;const rb=all["Robux"];if(rb)NCC_ROBUX=rb.map(x=>[x[0],x[1].reduce((a,b)=>a+b,0)]).sort((a,b)=>b[1]-a[1]).slice(0,10);}}
 return ok;}

function rng(seed){let s=seed>>>0;return()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};}
function dayArr(total,m,seed){const n=DAYS_IN[m],r=rng((seed>>>0)+m*97);let w=[],sum=0;for(let d=0;d<n;d++){const dow=new Date(2026,m,d+1).getDay();const b=dow===0?0.55:(dow===6?0.8:1);const x=b*(0.6+0.8*r());w.push(x);sum+=x;}return w.map(x=>Math.round(total*x/sum));}

function factor(){const mm=monthsInRange();let f=0;for(const m in mm){const mi=+m;f+=(monthNhap(mi)/(yearN()||1))*mm[m]/DAYS_IN[mi];}return f;} // prorate cho báo cáo tổng
/* giá trị theo scope từ mảng tháng (SPDV metric) */
function sval(arr,seed){return aggArr(arr,null,null,seed);}
function scopeData(){const o={nhap:{},xuat:{},die:{},don:0,totalNhap:0,totalXuat:0,totalDie:0};
 const touched=Object.keys(monthsInRange()).map(Number);
 SPDV.forEach(sp=>{let nh=0,xu=0,di=0;touched.forEach(mi=>{nh+=(NHAP[sp]&&NHAP[sp][mi])||0;xu+=(XUAT[sp]&&XUAT[sp][mi])||0;di+=(DIE[sp]&&DIE[sp][mi])||0;});o.nhap[sp]=nh;o.xuat[sp]=xu;o.die[sp]=di;o.totalNhap+=nh;o.totalXuat+=xu;o.totalDie+=di;});
 let don=0;touched.forEach(mi=>{don+=(DON.Robux[mi])||0;});o.don=don;return o;}
/* xu hướng theo scope: cả năm→tháng; else→ngày trong tháng */
function trend(totalFn,seed){const touched=Object.keys(monthsInRange()).map(Number).sort((a,b)=>a-b);
 return {labels:touched.map(mi=>'T'+(mi+1)),values:touched.map(mi=>totalFn(mi)||0),hl:-1};}

 }},
 PVH6:{title:"PVH6 · Tồn & tuổi tồn",meta:"Tần suất: Tuần",render:h=>frameOnly(h,"Cần nguồn TỒN thống nhất (RBX/Razer/GC có tồn riêng; Robux tồn ở Hub/Daily). Tuổi tồn cần ngày nhập từng đơn vị.")},
 PVH7:{title:"PVH7 · Đối soát Tiền–Hàng–Đơn",meta:"Tần suất: Tuần",render:h=>frameOnly(h,"Xương sống P&L: Backend(đơn) ↔ Kho(hàng) ↔ Kế toán(tiền). Cần chốt logic đối soát GC (3 ví BSV) & Topup.")},
 PVH11:{title:"PVH11 · Tỷ lệ lỗi nhập theo SPDV",meta:"Tần suất: Tháng",render:h=>framed(h,"Robux die/dồn (có). Cần bổ sung response/uptime API NCC; GC KBH/khiếu nại; Account hoàn theo NCC.")},
};

/* ==== chart cfg helpers ==== */
function lvl(){return "tháng";}
function shortSP(s){return s.replace("Nick Random Roblox","Nick").replace("Razer Gold","Razer").replace("Gift Card","GC");}
function donut(labels,data,colors,sm){return{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderColor:'#fff',borderWidth:1}]},options:{cutout:'56%',plugins:{legend:{position:'right',labels:{boxWidth:10,font:{size:10},padding:4}},tooltip:{callbacks:{label:c=>c.label+': '+fmt(c.parsed)}}}}};}
function barOpt(stackLegend){return{plugins:{legend:{display:!!stackLegend,position:'top',labels:{boxWidth:10}},tooltip:{callbacks:{label:c=>(c.dataset.label?c.dataset.label+': ':'')+fmt(c.parsed.y)}}},scales:{x:noX,y:{...yG,ticks:{callback:fmtAxis}}}};}
function hbarOpt(){return{indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed.x)}}},scales:{x:{...yG,ticks:{callback:fmtAxis}},y:noX}};}
function trendCfg(tr){const isDay=tr.labels.length>8;
 return{type:isDay?'bar':'line',data:{labels:tr.labels,datasets:[{data:tr.values,fill:!isDay,backgroundColor:isDay?tr.labels.map((_,i)=>i===tr.hl?'#0b3a8f':'#2e86e6'):'rgba(37,99,235,.16)',borderColor:'#1e5fd0',borderWidth:2,tension:.35,pointRadius:3,borderRadius:isDay?2:0}]},
 options:{plugins:{legend:{display:false},tooltip:{callbacks:{title:c=>(isDay?'Ngày ':'')+c[0].label,label:c=>fmt(c.parsed.y)}}},scales:{x:noX,y:{...yG,ticks:{callback:fmtAxis}}}}};}
function framed(host,msg){const sc=scopeData();
 host.innerHTML=`<div class="note">${msg}</div><div class="grid2" style="margin-top:12px">${cc("CO Nhập theo SPDV — "+scopeLabel(),"pf1")}${cc("CO Nhập theo "+(window._m<0?"tháng":"ngày"),"pf2")}</div>`;
 mk("pf1",{type:'bar',data:{labels:SPDV.map(shortSP),datasets:[{data:SPDV.map(s=>sc.nhap[s]),backgroundColor:'#1e5fd0'}]},options:hbarOpt()});
 mk("pf2",trendCfg(trend(monthNhap,7)));}
function frameOnly(host,msg){host.innerHTML=`<div class="card"><h3>Đang dựng — cần lớp L2</h3><div class="note">${msg}</div><p class="small" style="margin-top:10px">Bộ lọc thời gian đã sẵn; số sẽ hiện khi nối L2_TONGHOP.</p></div>`;}


/* ===== CÁCH B: đọc raw gom theo NGÀY (bắt đầu: Robux — đồng, ngày sạch) ===== */
const RAWURL_ROBUX=BASE+"?gid=562469906&single=true&output=csv";
let DAILY={nhap:{},xuat:{},die:{},don:{},_donLoaded:false};
let RAWLOADED={};
function pad(n){return(''+n).padStart(2,'0');}
function dkey(m,d){return '2026-'+pad(m+1)+'-'+pad(d);}
function pad2(n){return(''+n).padStart(2,'0');}
function iso(o){return o.y+'-'+pad2(o.mo+1)+'-'+pad2(o.d);}
function parseISO(x){const p=x.split('-');return{y:+p[0],mo:+p[1]-1,d:+p[2]};}
function clampD(o){let t=new Date(o.y,o.mo,o.d);const mn=new Date(2026,0,1),mx=new Date(2026,11,31);if(t<mn)t=mn;if(t>mx)t=mx;return{y:t.getFullYear(),mo:t.getMonth(),d:t.getDate()};}
function setRange(from,to){if(from)FROM=clampD(parseISO(from));if(to)TO=clampD(parseISO(to));
 const a=new Date(FROM.y,FROM.mo,FROM.d),b=new Date(TO.y,TO.mo,TO.d);if(a>b){const t=FROM;FROM=TO;TO=t;}
 const ff=document.getElementById('fFrom'),ft=document.getElementById('fTo');if(ff)ff.value=iso(FROM);if(ft)ft.value=iso(TO);
 applyFilter();}
function preset(k){const t=today();const mx=new Date(t.y,t.mo,t.d);
 if(k==='y'){FROM={y:t.y,mo:0,d:1};TO=t;}
 else if(k==='m'){FROM={y:t.y,mo:t.mo,d:1};TO=t;}
 else{const f=new Date(mx);f.setDate(f.getDate()-(k-1));FROM={y:f.getFullYear(),mo:f.getMonth(),d:f.getDate()};TO=t;}
 const ff=document.getElementById('fFrom'),ft=document.getElementById('fTo');if(ff)ff.value=iso(FROM);if(ft)ft.value=iso(TO);
 applyFilter();}
function rangeDays(){const out=[];const a=new Date(FROM.y,FROM.mo,FROM.d),b=new Date(TO.y,TO.mo,TO.d);for(let t=new Date(a);t<=b;t.setDate(t.getDate()+1))out.push({y:t.getFullYear(),mo:t.getMonth(),d:t.getDate()});return out;}
function monthsInRange(){const mm={};rangeDays().forEach(x=>{if(x.y===2026&&x.mo<6)mm[x.mo]=(mm[x.mo]||0)+1;});return mm;}
function aggArr(arr,sp,map,seed){if(map&&sp&&map[sp]){let t=0;rangeDays().forEach(x=>{if(x.y===2026)t+=map[sp][dkey(x.mo,x.d)]||0;});return t;}const mm=monthsInRange();let t=0;for(const m in mm){const mi=+m;t+=(arr&&arr[mi]?arr[mi]:0)*mm[m]/DAYS_IN[mi];}return Math.round(t);}
function parseFX(rows){const map={};for(let r=0;r<rows.length;r++){const row=rows[r]||[];const dt=parseDateCell(row[1]);const rate=num(row[2]);if(dt&&rate>0)map[dkey(dt.mo,dt.d)]=rate;}if(Object.keys(map).length){FXMAP=map;FXKEYS=Object.keys(map).sort();}}
function fxRate(key){if(FXMAP[key])return FXMAP[key];let best=0;for(const k of FXKEYS){if(k<=key)best=FXMAP[k];else break;}if(best)return best;return FXKEYS.length?FXMAP[FXKEYS[0]]:0;}
function parseDateCell(v){if(v==null)return null;v=(''+v).trim();let m=v.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);if(m)return{mo:+m[2]-1,d:+m[3]};m=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m){let a=+m[1],b=+m[2],mo,dd;if(a>12){dd=a;mo=b;}else if(b>12){mo=a;dd=b;}else{dd=a;mo=b;}return{mo:mo-1,d:dd};}const dt=new Date(v);return isNaN(dt)?null:{mo:dt.getMonth(),d:dt.getDate()};}
function hIdx(rows,need){for(let r=0;r<Math.min(rows.length,15);r++){const row=(rows[r]||[]).map(x=>(''+x).trim());if(need.every(n=>row.includes(n))){const i={};row.forEach((v,c)=>{if(!(v in i))i[v]=c;});return{r,i};}}return{r:-1,i:{}};}
function findc(row,re){if(!row)return -1;for(let c=0;c<row.length;c++)if(re.test((''+row[c]).trim()))return c;return -1;}
function buildRobux(rows){const H=hIdx(rows,['NGÀY NHẬP','THÀNH TIỀN']);if(H.r<0)return false;const iD=H.i['NGÀY NHẬP'],iT=H.i['THÀNH TIỀN'];const iDie=findc(rows[H.r],/tiền rb die|die.*(kbh|không)/i);const iDon=findc(rows[H.r],/tiền robux dồn/i);
 DAILY.nhap['Robux']={};DAILY.die['Robux']={};DAILY.don={};DAILY._donLoaded=true;
 for(let r=H.r+1;r<rows.length;r++){const row=rows[r];if(!row)continue;const dt=parseDateCell(row[iD]);if(!dt||dt.mo<0||dt.mo>5)continue;const k=dkey(dt.mo,dt.d);
  DAILY.nhap['Robux'][k]=(DAILY.nhap['Robux'][k]||0)+num(row[iT]);
  if(iDie>=0)DAILY.die['Robux'][k]=(DAILY.die['Robux'][k]||0)+num(row[iDie]);
  if(iDon>=0)DAILY.don[k]=(DAILY.don[k]||0)+num(row[iDon]);}
 return true;}
async function ensureDaily(){if(RAWLOADED.robux!==undefined)return;RAWLOADED.robux='loading';
 const rows=await fetchCSV(RAWURL_ROBUX);RAWLOADED.robux=(rows&&rows.length&&buildRobux(rows))?true:'failed';
 if(curr!=="SRC")render();}


/* ===== ENGINE đọc raw theo cột đã verify (PVH3/PVH5; PVH4 nhịp sau) ===== */
const RAWCFG={
 robux:{gid:562469906,date:0,val:3,unit:2,emp:5,ncc:4,cat:6,usd:false,sp:"Robux"},
 nick:{gid:61864847,date:0,val:5,unit:5,emp:1,ncc:6,cat:3,usd:false,sp:"Nick Random Roblox"},
 gc:{gid:1043029815,date:13,val:10,unit:10,emp:16,ncc:5,cat:8,usd:true,onlyCol:3,onlyVal:"thêm mới code",sp:"Gift Card"},
 razer:{gid:1868031300,date:0,val:5,unit:3,emp:-1,ncc:-1,cat:-1,usd:true,sp:"Razer Gold"},
 og:{gid:793401472,date:8,val:6,unit:6,emp:-1,ncc:-1,cat:2,usd:true,sp:"Topup"}
};
let RAWDATA={},RAWSTATE={};
function fetchRaw(key){if(RAWDATA[key])return Promise.resolve(RAWDATA[key]);if(RAWSTATE[key])return RAWSTATE[key];
 const cfg=RAWCFG[key];const url=BASE+"?gid="+cfg.gid+"&single=true&output=csv";
 RAWSTATE[key]=loadCSV(url).then(rows=>{const recs=[];(rows||[]).forEach(row=>{const dt=parseDateCell(row[cfg.date]);if(!dt||dt.mo<0)return;if(cfg.onlyCol!=null&&(''+(row[cfg.onlyCol]||'')).trim().toLowerCase()!==cfg.onlyVal)return;recs.push({dk:dkey(dt.mo,dt.d),val:num(row[cfg.val]),unit:num(row[cfg.unit]),emp:cfg.emp>=0?(''+(row[cfg.emp]||'')).trim():'',ncc:cfg.ncc>=0?(''+(row[cfg.ncc]||'')).trim():'',cat:cfg.cat>=0?(''+(row[cfg.cat]||'')).trim():''});});RAWDATA[key]=recs;return recs;});
 return RAWSTATE[key];}
function ensureRaw(keys){return Promise.all(keys.map(fetchRaw));}
function recsIn(key){const cfg=RAWCFG[key],fk=iso(FROM),tk=iso(TO);return (RAWDATA[key]||[]).filter(r=>r.dk>=fk&&r.dk<=tk).map(r=>({emp:r.emp,ncc:r.ncc,cat:r.cat,valv:cfg.usd?r.val*fxRate(r.dk):r.val,unitv:cfg.usd?r.unit*fxRate(r.dk):r.unit}));}
function groupSum(key,field){const o={};recsIn(key).forEach(r=>{const k=r[field]||'(trống)';o[k]=(o[k]||0)+r.valv;});return Object.entries(o).filter(x=>x[0]!=='(trống)').sort((a,b)=>b[1]-a[1]);}
function groupAvgUnit(key,field){const o={},c={};recsIn(key).forEach(r=>{if(r.unitv<=0)return;const k=r[field]||'(trống)';o[k]=(o[k]||0)+r.unitv;c[k]=(c[k]||0)+1;});return Object.entries(o).filter(x=>x[0]!=='(trống)').map(([k,v])=>[k,c[k]?Math.round(v/c[k]):0]).sort((a,b)=>b[1]-a[1]);}
function spinner(t){return '<div class="center"><div class="spin"></div>'+t+'</div>';}

/* ===== ROUTER ===== */
const TIERS=[[1,"Tầng 1 · Điều hành (CEO · Tháng)",["PVH1","PVH2","PVH8"]],[2,"Tầng 2 · Kiểm soát (Leader · Tuần)",["PVH3","PVH4","PVH5","PVH6","PVH7","PVH9","PVH10","PVH11","PVH12"]]];

  document.getElementById('content').innerHTML=`<div class="card"><h3 style="text-align:left">Kiến trúc dữ liệu</h3><p class="small" style="line-height:1.9">Raw (9 tab) → <b>L2_TONGHOP</b> (cấp Ngày, long-format: Ngày·Năm·Tháng·Tuần·SPDV·Nghiệp vụ·SL·Giá trị) → web này. Mọi trang &amp; bộ lọc Ngày/Tháng/Năm đọc chung L2.</p></div><div class="note" style="margin-top:12px">Bản demo dùng số nhúng (Tháng thật · Ngày mẫu). Bước tiếp: dựng L2_TONGHOP trong Sheet → publish CSV → nối realtime.</div>`;return;}
 render();}
